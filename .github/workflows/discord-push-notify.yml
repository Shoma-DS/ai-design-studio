name: Discord Push Notify

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      REPOSITORY: ${{ github.repository }}
      REF_NAME: ${{ github.ref_name }}
      ACTOR: ${{ github.actor }}
      SHA: ${{ github.sha }}
      COMPARE_URL: ${{ github.event.compare }}
      HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
      HEAD_COMMIT_URL: ${{ github.event.head_commit.url }}
      RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Send push notification
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK secret is not configured. Skipping notification."
            exit 0
          fi

          node <<'NODE'
          const webhook = process.env.DISCORD_WEBHOOK;
          const repo = process.env.REPOSITORY;
          const branch = process.env.REF_NAME;
          const actor = process.env.ACTOR;
          const sha = process.env.SHA;
          const shortSha = sha.slice(0, 7);
          const compareUrl = process.env.COMPARE_URL || "";
          const commitUrl = process.env.HEAD_COMMIT_URL || "";
          const runUrl = process.env.RUN_URL || "";
          const rawMessage = process.env.HEAD_COMMIT_MESSAGE || "(commit message unavailable)";
          const message = rawMessage.length > 900 ? `${rawMessage.slice(0, 897)}...` : rawMessage;

          const payload = {
            username: "GitHub Push",
            embeds: [
              {
                title: `Push: ${repo}@${branch}`,
                url: compareUrl || commitUrl || runUrl,
                description: message,
                color: 0x2f81f7,
                fields: [
                  { name: "Repository", value: repo, inline: true },
                  { name: "Branch", value: branch, inline: true },
                  { name: "Actor", value: actor, inline: true },
                  { name: "Commit", value: commitUrl ? `[${shortSha}](${commitUrl})` : shortSha, inline: true },
                  { name: "Compare", value: compareUrl ? `[View changes](${compareUrl})` : "Unavailable", inline: true },
                  { name: "Workflow", value: runUrl ? `[Run log](${runUrl})` : "Unavailable", inline: true }
                ],
                timestamp: new Date().toISOString()
              }
            ]
          };

          (async () => {
            const response = await fetch(webhook, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });

            if (!response.ok) {
              const body = await response.text();
              throw new Error(`Discord webhook failed: ${response.status} ${body}`);
            }
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
