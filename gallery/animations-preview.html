<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>アニメーションスニペット プレビュー</title>
<style>
  :root { color-scheme: light dark; }
  body {

    margin: 0;
    padding: 32px;
    background: #f5f5f7;
    color: #1a1a1a;
  }
  @media (prefers-color-scheme: dark) {

    gap: 20px;
  }
  .card {
    background: #fff;
    border: 1px solid #e2e2e2;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .demo {

    position: relative;
  }
  .demo iframe {

    height: 100%;
    border: none;
  }

    top: 6px;
    right: 6px;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    background: rgba(255, 255, 255, 0.95);

    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .demo:hover .replay,
  .demo:focus-within .replay {
    opacity: 1;
  }
  .cardbody { padding: 16px 18px; }
  .name { font-weight: 700; font-size: 16px; margin-bottom: 6px; }
  .slug { font-size: 12px; color: #999; margin-bottom: 10px; }
  .desc { font-size: 14px; line-height: 1.7; color: #444; margin-bottom: 10px; }
  @media (prefers-color-scheme: dark) { .desc { color: #ccc; } }
  .use-case { font-size: 13px; color: #6a4fd6; margin-bottom: 10px; line-height: 1.6; }
  @media (prefers-color-scheme: dark) { .use-case { color: #b8a6ff; } }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-size: 11.5px;
    background: #f0eefc;
    color: #6a4fd6;
    padding: 3px 10px;
    border-radius: 999px;
  }
  @media (prefers-color-scheme: dark) {
    .tag { background: #2a2440; color: #b8a6ff; }
  }
  .mood-tag {
    font-size: 11.5px;
    background: #eef6f0;
    color: #1f8a4c;
    padding: 3px 10px;
    border-radius: 999px;
    font-weight: 700;
  }
  @media (prefers-color-scheme: dark) {
    .mood-tag { background: #16321f; color: #6fd695; }
  }
  .hover-hint {
    position: absolute;
    top: 8px;
    left: 8px;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(26, 26, 26, 0.8);
    color: #fff;
    pointer-events: none;
    transition: opacity 0.2s ease;
    z-index: 2;
  }
  .demo:hover .hover-hint {
    opacity: 0;
  }
  .mood-filter {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }
  .mood-filter button {
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid #ccc;
    background: #fff;
    cursor: pointer;
  }
  .mood-filter button.is-active {
    background: #1a1a1a;
    color: #fff;
    border-color: #1a1a1a;
  }
  @media (prefers-color-scheme: dark) {
    .mood-filter button { background: #222; color: #eee; border-color: #444; }
    .mood-filter button.is-active { background: #6fd695; color: #111; border-color: #6fd695; }
  }
  .card.is-hidden { display: none; }
</style>
</head>

background-position: -200% center; }\n}","htmlSnippet":"<span class=\"gradient-shimmer\">Sample</span>","jsCode":null,"tags":["title","gradient","gold","高級感","美容","ネイル"],"useCase":"高級感・美容系LPのロゴやキャッチコピー","moodTags":["オシャレ","派手"]},{"slug":"typewriter","name":"タイプライター表示","category":"title","description":"文字が左から順にタイプされるように表示され、カーソルが点滅する。width/stepsの数値は表示する文字数に合わせて調整する。","cssCode":".typewriter {\n  display: inline-block;\n  overflow: hidden;\n  white-space: nowrap;\n  width: 6ch; /* 文字数に応じて調整 */\n  border-right: 2px solid currentColor;\n  animation: typing 2.5s steps(6, end), blink 0.75s step-end infinite;\n}\n@keyframes typing {\n  from { width: 0; }\n  to { width: 6ch; }\n}\n@keyframes blink { 50% { border-color: transparent; } }","htmlSnippet":"<span class=\"typewriter\">Sample</span>","jsCode":null,"tags":["title","typewriter","キャッチコピー"],"useCase":"サービス紹介の一言キャッチコピー","moodTags":["シンプル"]},{"slug":"underline-grow","name":"下線が伸びる強調","category":"title","description":"見出しやキーワードの下線が左から右へ伸びて表示され、視線を誘導する。","cssCode":".underline-grow {\n  position: relative;\n  display: inline-block;\n}\n.underline-grow::after {\n  content: \"\";\n  position: absolute;\n  left: 0;\n  bottom: -4px;\n  width: 100%;\n  height: 2px;\n  background: currentColor;\n  transform: scaleX(0);\n  transform-origin: left;\n  animation: growLine 0.8s ease forwards 0.3s;\n}\n@keyframes growLine { to { transform: scaleX(1); } }","htmlSnippet":"<span class=\"underline-grow\">Sample</span>","jsCode":null,"tags":["title","underline","強調"],"useCase":"キーワードの強調、見出しの装飾","moodTags":["シンプル","見やすい"]},{"slug":"scroll-fade-up","name":"スクロールで下から表示","category":"scroll","description":"要素が画面内に入ったタイミングで下からふわっと表示される、最も汎用的なセクション登場演出。","cssCode":".reveal {\n  opacity: 0;\n  transform: translateY(32px);\n  transition: opacity 0.8s ease, transform 0.8s ease;\n}\n.reveal.is-visible {\n  opacity: 1;\n  transform: translateY(0);\n}","htmlSnippet":"<div class=\"reveal\">Sample</div>","jsCode":"const observer = new IntersectionObserver( __track {\n  display: inline-flex;\n  gap: 48px;\n  animation: marqueeScroll 20s linear infinite;\n  transition: animation-duration 0.4s ease;\n}\n.marquee-hover:hover .marquee-hover__track {\n  animation-duration: 60s;\n}\n.marquee-hover__track span {\n  padding: 8px 20px;\n  border: 1px solid #ddd;\n  border-radius: 6px;\n  font-size: 12px;\n  color: #888;\n}\n@keyframes marqueeScroll {\n  from { transform: translateX(0); }\n  to { transform: translateX(-50%); }\n}","htmlSnippet":"<div class=\"marquee-hover\"><div class=\"marquee-hover__track\">\n  <span>Sample</span><span>Sample</span><span>Sample</span><span>Sample</span>\n  <span>Sample</span><span>Sample</span><span>Sample</span><span>Sample</span>\n</div></div>","jsCode":null,"tags":["marquee","logo","hover","導入実績","メディア掲載"],"useCase":"導入企業ロゴ・メディア掲載バッジ(ホバーでじっくり見せたい場合)、marquee-loopの発展形","moodTags":["シンプル","見やすい"]},{"slug":"text-block-reveal","name":"ブロックスイープ文字表示","category":"title","description":"色付きのバーが文字の上を左から右へ通過し、通過した瞬間にテキストが現れる上品な見出し表示。","cssCode":".block-reveal-wrap {\n  position: relative;\n  display: inline-block;\n  overflow: hidden;\n}\n.block-reveal-text {\n  display: inline-block;\n  opacity: 0;\n  animation: revealTextShow 0.1s linear forwards 0.6s;\n}\n.block-reveal-bar {\n  position: absolute;\n  inset: 0;\n  background: #1a1a1a;\n  animation: revealBarSweep 1s cubic-bezier(0.77, 0, 0.18, 1) forwards;\n}\n@keyframes revealBarSweep {\n  0% { transform: scaleX(0); transform-origin: left; }\n  50% { transform: scaleX(1); transform-origin: left; }\n  51% { transform-origin: right; }\n  100% { transform: scaleX(0); transform-origin: right; }\n}\n@keyframes revealTextShow {\n  to { opacity: 1; }\n}","htmlSnippet":"<span class=\"block-reveal-wrap\"><span class=\"block-reveal-text\">Sample</span><span class=\"block-reveal-bar\"></span></span>","jsCode":null,"tags":["title","reveal","block","上品","テキスト効果"],"useCase":"ブランド系LP・HPの上品な見出し登場演出","moodTags":["オシャレ","見やすい"]},{"slug":"text-reveal-conic-gradient","name":"扇状に浮かび上がる文字表示","category":"title","description":"conic-gradientを使い、文字が扇状にぼんやりと浮かび上がるように表示される。モダンブラウザ向け。","cssCode":"@property --reveal-angle {\n  syntax: '<angle>';\n  inherits: false;\n  initial-value: 0deg;\n}\n.conic-reveal {\n  background: conic-gradient(from 0deg, #1a1a1a var(--reveal-angle), transparent var(--reveal-angle));\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n  animation: conicReveal 1.5s ease forwards;\n}\n@keyframes conicReveal {\n  to { --reveal-angle: 360deg; }\n}\n/* Safari/Firefoxの一部バージョンは@propertyに非対応。非対応環境ではグラデーション無しの通常表示にフォールバックする */","htmlSnippet":"<h2 class=\"conic-reveal\">Sample</h2>","jsCode":null,"tags":["title","conic-gradient","reveal","モダンCSS","テキスト効果"],"useCase":"ロゴ・キャッチコピーの登場演出(対応ブラウザ限定)","moodTags":["オシャレ"]},{"slug":"title-twist-hover","name":"ホバーで回転する文字","category":"title","description":"ホバーすると文字がくるりと3D回転して見える演出。ナビゲーションやボタンラベルに。","cssCode":".twist-hover {\n  display: inline-block;\n  transition: transform 0.5s ease;\n  transform-style: preserve-3d;\n}\n.twist-hover:hover {\n  transform: rotateX(360deg);\n}","htmlSnippet":"<a href=\"#\" class=\"twist-hover\">Sample</a>","jsCode":null,"tags":["title","hover","3d","回転","ナビゲーション","テキスト効果"],"useCase":"ナビゲーションリンク、ボタンラベルのホバー演出","moodTags":["ポップ"]},{"slug":"logo-stroke-draw","name":"輪郭線が描かれるロゴ表示","category":"装飾","description":"ロゴやタイトルの輪郭線が、ペンで描くように少しずつ現れるSVGストロークアニメーション。","cssCode":".stroke-draw path {\n  fill: none;\n  stroke: currentColor;\n  stroke-width: 2;\n  stroke-dasharray: 300;\n  stroke-dashoffset: 300;\n  animation: drawStroke 2s ease forwards;\n}\n@keyframes drawStroke {\n  to { stroke-dashoffset: 0; }\n}\n/* stroke-dasharray/dashoffsetの数値は、実際のpathの長さ(element.getTotalLength())に合わせて調整する */","htmlSnippet":"<svg class=\"stroke-draw\" viewBox=\"0 0 200 60\"><path d=\"M10,40 Q100,-10 190,40\" /></svg>","jsCode":null,"tags":["logo","svg","stroke","ブランド","テキスト効果"],"useCase":"ロゴ・ブランド名の登場演出、サービスタイトルの装飾","moodTags":["オシャレ","シンプル"]},{"slug":"text-shadow-emboss","name":"エンボス風の浮き上がり文字","category":"title","description":"文字がふわっと浮き上がって見える、上下2色の影を使ったエンボス風テキストシャドウ。","cssCode":".emboss-text {\n  color: #e8e8ec;\n  background: #d8d8de;\n  padding: 8px 16px;\n  animation: embossBreath 3s ease-in-out infinite;\n}\n@keyframes embossBreath {\n  0%, 100% {\n    text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.7), -1px -1px 1px rgba(0, 0, 0, 0.25);\n  }\n  50% {\n    text-shadow: 2px 2px 1px rgba(255, 255, 255, 0.9), -2px -2px 2px rgba(0, 0, 0, 0.35);\n  }\n}","htmlSnippet":"<h2 class=\"emboss-text\">Sample</h2>","jsCode":null,"tags":["title","emboss","shadow","高級感","立体感","テキスト効果"],"useCase":"明るい背景での高級感・立体感の演出(見出し・ロゴ)","moodTags":["シンプル","オシャレ"]},{"slug":"text-scroll-driven-reveal","name":"スクロール連動テキスト表示","category":"scroll","description":"スクロール量に連動して文字が左から徐々にはっきり表示される、scroll-timelineを使ったモダンな演出。","cssCode":".scroll-reveal-text {\n  clip-path: inset(0 100% 0 0);\n  animation: scrollRevealClip linear;\n  animation-timeline: view();\n  animation-range: entry 0% cover 40%;\n}\n@keyframes scrollRevealClip {\n  to { clip-path: inset(0 0 0 0); }\n}\n/* animation-timeline: view() は2023年以降のChromium系ブラウザのみ対応。\n   Safari/Firefoxは非対応のため、scroll-fade-upのIntersectionObserver版をフォールバックとして用意する */","htmlSnippet":"<h2 class=\"scroll-reveal-text\">Sample</h2>","jsCode":null,"tags":["scroll","scroll-timeline","reveal","モダンCSS","テキスト効果"],"useCase":"ストーリーテリング型LPの本文セクション見出し(対応ブラウザ限定、他はscroll-fade-upで代替)","moodTags":["オシャレ","見やすい"]},{"slug":"loading-spinner","name":"円形ローディングスピナー","category":"loading","description":"シンプルな円形ローディングスピナー。データ読み込み中の待機表示に。","cssCode":".spinner {\n  width: 40px;\n  height: 40px;\n  border: 4px solid rgba(0, 0, 0, 0.1);\n  border-top-color: #333;\n  border-radius: 50%;\n  animation: spin 0.8s linear infinite;\n}\n@keyframes spin {\n  to { transform: rotate(360deg); }\n}","htmlSnippet":"<div class=\"spinner\"></div>","jsCode":null,"tags":["loading","spinner","基本"],"useCase":"フォーム送信中、データ読み込み中の待機表示","moodTags":["シンプル","見やすい"]},{"slug":"skeleton-loading-shimmer","name":"スケルトンローディング","category":"loading","description":"コンテンツ読み込み前に表示する、光が流れるスケルトンプレースホルダー。","cssCode":".skeleton {\n  background: linear-gradient(90deg, #d0d0d0 25%, #e8e8e8 50%, #d0d0d0 75%);\n  background-size: 200% 100%;\n  animation: skeletonShimmer 1.4s ease-in-out infinite;\n  border-radius: 4px;\n}\n@keyframes skeletonShimmer {\n  0% { background-position: 200% 0; }\n  100% { background-position: -200% 0; }\n}","htmlSnippet":"<div class=\"skeleton\" style=\"width:100%;height:18px;margin-bottom:10px;\"></div>\n<div class=\"skeleton\" style=\"width:80%;height:18px;margin-bottom:10px;\"></div>\n<div class=\"skeleton\" style=\"width:60%;height:18px;\"></div>","jsCode":null,"tags":["loading","skeleton","基本"],"useCase":"画像・カード・記事一覧のローディングプレースホルダー","moodTags":["シンプル","見やすい"]},{"slug":"scroll-progress-bar","name":"スクロール進行バー","category":"scroll","description":"ページ上部に、スクロール量に応じて伸びるプログレスバーを表示する読了インジケーター。","cssCode":".scroll-progress {\n  position: fixed;\n  top: 0;\n  left: 0;\n  height: 4px;\n  width: 0%;\n  background: #1a1a1a;\n  z-index: 9999;\n  transition: width 0.1s ease-out;\n}","htmlSnippet":"<div class=\"scroll-progress\"></div>","jsCode":"const bar = document.querySelector(\".scroll-progress\");\nfunction updateProgress() {\n  const scrollTop = document.documentElement.scrollTop;\n  const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;\n  bar.style.width = `${(scrollTop / scrollHeight) * 100}%`;\n}\nwindow.addEventListener(\"scroll\", updateProgress);","tags":["scroll","progress-bar","読了","基本"],"useCase":"長文コラム・ブログ記事、長いLPの読了度表示","moodTags":["シンプル","見やすい"]},{"slug":"back-to-top-fade","name":"トップへ戻るボタン","category":"scroll","description":"一定量スクロールすると、画面右下にトップへ戻るボタンがふわっと現れる。","cssCode":".back-to-top {\n  position: fixed;\n  right: 24px;\n  bottom: 24px;\n  width: 48px;\n  height: 48px;\n  border-radius: 50%;\n  opacity: 0;\n  visibility: hidden;\n  transform: translateY(16px);\n  transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;\n}\n.back-to-top.is-visible {\n  opacity: 1;\n  visibility: visible;\n  transform: translateY(0);\n}","htmlSnippet":"<button class=\"back-to-top\">↑</button>","jsCode":"const btn = document.querySelector(\".back-to-top\");\nwindow.addEventListener(\"scroll\", () => {\n  btn.classList.toggle(\"is-visible\", window.scrollY > 400);\n});\nbtn.addEventListener(\"click\", () => window.scrollTo({ top: 0, behavior: \"smooth\" }));","tags":["scroll","back-to-top","基本"],"useCase":"長いLP/コラムページのトップへ戻る導線","moodTags":["シンプル","見やすい"]},{"slug":"hamburger-menu-morph","name":"ハンバーガーメニュー変形","category":"navigation","description":"ハンバーガーメニューアイコンがタップでバツ印(×)に変形するアニメーション。","cssCode":".hamburger {\n  width: 28px;\n  height: 20px;\n  position: relative;\n  cursor: pointer;\n}\n.hamburger span {\n  position: absolute;\n  left: 0;\n  width: 100%;\n  height: 2px;\n  background: currentColor;\n  transition: transform 0.3s ease, opacity 0.3s ease, top 0.3s ease;\n}\n.hamburger span:nth-child(1) { top: 0; }\n.hamburger span:nth-child(2) { top: 9px; }\n.hamburger span:nth-child(3) { top: 18px; }\n.hamburger.is-open span:nth-child(1) { top: 9px; transform: rotate(45deg); }\n.hamburger.is-open span:nth-child(2) { opacity: 0; }\n.hamburger.is-open span:nth-child(3) { top: 9px; transform: rotate(-45deg); }","htmlSnippet":"<div class=\"hamburger\"><span></span><span></span><span></span></div>","jsCode":"document.querySelector(\".hamburger\").addEventListener(\"click\", function () {\n  this.classList.toggle(\"is-open\");\n});","tags":["navigation","hamburger","menu","基本"],"useCase":"スマホ用ナビゲーションメニューの開閉ボタン","moodTags":["シンプル","見やすい"]},{"slug":"accordion-toggle","name":"アコーディオン開閉","category":"ui","description":"FAQなどでクリックすると滑らかに開閉するアコーディオン。","cssCode":".accordion-item .accordion-body {\n  max-height: 0;\n  overflow: hidden;\n  transition: max-height 0.35s ease;\n}\n.accordion-item.is-open .accordion-body {\n  max-height: 400px;\n}\n.accordion-item .accordion-head {\n  cursor: pointer;\n}\n.accordion-item .accordion-head::after {\n  content: \"+\";\n  float: right;\n  transition: transform 0.3s ease;\n}\n.accordion-item.is-open .accordion-head::after {\n  transform: rotate(45deg);\n}","htmlSnippet":"<div class=\"accordion-item\">\n  <div class=\"accordion-head\">Sample Question</div>\n  <div class=\"accordion-body\"><p>Sample answer text.</p></div>\n</div>","jsCode":"document.querySelectorAll(\".accordion-head\").forEach((head) => {\n  head.addEventListener(\"click\", () => head.parentElement.classList.toggle(\"is-open\"));\n});","tags":["ui","accordion","faq","基本"],"useCase":"FAQセクション、料金プラン詳細の開閉","moodTags":["シンプル","見やすい"]},{"slug":"card-flip-3d","name":"カード3Dフリップ","category":"ui","description":"カードにホバーすると表から裏へくるりと反転する3Dフリップ演出。","cssCode":".flip-card {\n  perspective: 1000px;\n  width: 200px;\n  height: 120px;\n}\n.flip-card-inner {\n  position: relative;\n  width: 100%;\n  height: 100%;\n  transition: transform 0.6s;\n  transform-style: preserve-3d;\n}\n.flip-card:hover .flip-card-inner {\n  transform: rotateY(180deg);\n}\n.flip-card-front,\n.flip-card-back {\n  position: absolute;\n  inset: 0;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  backface-visibility: hidden;\n  background: #f0f0f0;\n  border-radius: 8px;\n}\n.flip-card-back {\n  transform: rotateY(180deg);\n  background: #1a1a1a;\n  color: #fff;\n}","htmlSnippet":"<div class=\"flip-card\"><div class=\"flip-card-inner\">\n  <div class=\"flip-card-front\">Sample Front</div>\n  <div class=\"flip-card-back\">Sample Back</div>\n</div></div>","jsCode":null,"tags":["ui","card","flip","hover","基本"],"useCase":"スタッフ紹介カード、サービス一覧カードのホバー演出","moodTags":["ポップ","派手"]},{"slug":"drawer-slide-menu","name":"ドロワーメニュー","category":"navigation","description":"画面端からスライドして現れるドロワー(サイドメニュー)の開閉。","cssCode":".drawer {\n  position: fixed;\n  top: 0;\n  right: 0;\n  width: 240px;\n  height: 100%;\n  background: #fff;\n  box-shadow: -2px 0 12px rgba(0, 0, 0, 0.15);\n  padding: 24px;\n  box-sizing: border-box;\n  transform: translateX(100%);\n  transition: transform 0.35s ease;\n  z-index: 1000;\n}\n.drawer.is-open {\n  transform: translateX(0);\n}\n.drawer-overlay {\n  position: fixed;\n  inset: 0;\n  background: rgba(0, 0, 0, 0.4);\n  opacity: 0;\n  visibility: hidden;\n  transition: opacity 0.35s ease, visibility 0.35s;\n}\n.drawer-overlay.is-open {\n  opacity: 1;\n  visibility: visible;\n}","htmlSnippet":"<button class=\"drawer-open-btn\">Menu</button>\n<div class=\"drawer-overlay\"></div>\n<div class=\"drawer\">Sample Menu</div>","jsCode":"const menuButton = document.querySelector(\".drawer-open-btn\");\nconst drawer = document.querySelector(\".drawer\");\nconst overlay = document.querySelector(\".drawer-overlay\");\nmenuButton.addEventListener(\"click\", () => {\n  drawer.classList.add(\"is-open\");\n  overlay.classList.add(\"is-open\");\n});\noverlay.addEventListener(\"click\", () => {\n  drawer.classList.remove(\"is-open\");\n  overlay.classList.remove(\"is-open\");\n});","tags":["navigation","drawer","menu","基本"],"useCase":"スマホ用サイドメニュー、フィルターパネル","moodTags":["シンプル","見やすい"]},{"slug":"toast-notification-slide","name":"トースト通知","category":"notification","description":"画面右下からスライドインし、数秒後に自動で消えるトースト通知。","cssCode":".toast {\n  position: fixed;\n  right: 24px;\n  bottom: 24px;\n  padding: 14px 20px;\n  background: #1a1a1a;\n  color: #fff;\n  border-radius: 8px;\n  transform: translateY(20px);\n  opacity: 0;\n  transition: transform 0.3s ease, opacity 0.3s ease;\n}\n.toast.is-visible {\n  transform: translateY(0);\n  opacity: 1;\n}","htmlSnippet":"<button class=\"toast-trigger-btn\">Show Toast</button>\n<div class=\"toast\"></div>","jsCode":"function showToast(message, duration = 3000) {\n  const toast = document.querySelector(\".toast\");\n  toast.textContent = message;\n  toast.classList.add(\"is-visible\");\n  setTimeout(() => toast.classList.remove(\"is-visible\"), duration);\n}\ndocument.querySelector(\".toast-trigger-btn\").addEventListener(\"click\", () => showToast(\"Sample notification\"));","tags":["notification","toast","基本"],"useCase":"フォーム送信完了・カート追加などの完了通知","moodTags":["シンプル","見やすい"]},{"slug":"ripple-click-effect","name":"クリックリップルエフェクト","category":"button","description":"ボタンをクリックした位置から波紋が広がるマテリアルデザイン風のリップルエフェクト。","cssCode":".ripple {\n  position: relative;\n  overflow: hidden;\n}\n.ripple-circle {\n  position: absolute;\n  border-radius: 50%;\n  background: rgba(255, 255, 255, 0.6);\n  transform: scale(0);\n  animation: rippleEffect 0.6s ease-out;\n  pointer-events: none;\n}\n@keyframes rippleEffect {\n  to {\n    transform: scale(4);\n    opacity: 0;\n  }\n}","htmlSnippet":"<button class=\"ripple\">Sample</button>","jsCode":"const button = document.querySelector(\".ripple\");\nbutton.addEventListener(\"click\", (e) => {\n  const rect = button.getBoundingClientRect();\n  const circle = document.createElement(\"span\");\n  const size = Math.max(rect.width, rect.height);\n  circle.className = \"ripple-circle\";\n  circle.style.width = circle.style.height = `${size}px`;\n  circle.style.left = `${e.clientX - rect.left - size / 2}px`;\n  circle.style.top = `${e.clientY - rect.top - size / 2}px`;\n  button.appendChild(circle);\n  circle.addEventListener(\"animationend\", () => circle.remove());\n});","tags":["button","ripple","click","基本"],"useCase":"ボタン・カードのクリックフィードバック","moodTags":["ポップ","見やすい"]},{"slug":"svg-checkmark-draw","name":"チェックマーク描画アニメーション","category":"ui","description":"フォーム送信完了時などに使う、チェックマークが円を描きながら現れる成功アニメーション。","cssCode":".check-circle,\n.check-mark {\n  fill: none;\n  stroke: #2cb67d;\n  stroke-width: 3;\n  stroke-linecap: round;\n}\n.check-circle {\n  stroke-dasharray: 166;\n  stroke-dashoffset: 166;\n  animation: drawCircle 0.6s ease forwards;\n}\n.check-mark {\n  stroke-dasharray: 48;\n  stroke-dashoffset: 48;\n  animation: drawCheck 0.4s ease forwards 0.5s;\n}\n@keyframes drawCircle {\n  to { stroke-dashoffset: 0; }\n}\n@keyframes drawCheck {\n  to { stroke-dashoffset: 0; }\n}","htmlSnippet":"<svg viewBox=\"0 0 52 52\" width=\"60\" height=\"60\">\n  <circle class=\"check-circle\" cx=\"26\" cy=\"26\" r=\"24\" />\n  <path class=\"check-mark\" d=\"M14 27l7 7 16-16\" />\n</svg>","jsCode":null,"tags":["ui","svg","success","checkmark","基本"],"useCase":"フォーム送信完了、予約完了ページの成功表示","moodTags":["シンプル","見やすい"]},{"slug":"circular-progress-ring","name":"円形プログレスリング","category":"ui","description":"SVGでリング状に円を描く、パーセンテージ表示用の円形プログレスバー。","cssCode":".progress-ring__circle {\n  fill: none;\n  stroke: #1a1a1a;\n  stroke-width: 8;\n  stroke-linecap: round;\n  transform: rotate(-90deg);\n  transform-origin: center;\n  transition: stroke-dashoffset 0.6s ease;\n}","htmlSnippet":"<svg width=\"120\" height=\"120\"><circle class=\"progress-ring__circle\" cx=\"60\" cy=\"60\" r=\"52\" /></svg>","jsCode":"function setProgress(circle, percent) {\n  const radius = circle.r.baseVal.value;\n  const circumference = 2 * Math.PI * radius;\n  circle.style.strokeDasharray = `${circumference} ${circumference}`;\n  circle.style.strokeDashoffset = circumference - (percent / 100) * circumference;\n}\n// 使用例(実際の数値に置き換えて呼び出す)\nsetProgress(document.querySelector(\".progress-ring__circle\"), 72);","tags":["ui","svg","progress","満足度","基本"],"useCase":"満足度・達成率などの数値をビジュアルで見せる","moodTags":["シンプル","見やすい"]},{"slug":"modal-fade-scale","name":"モーダルフェード表示","category":"ui","description":"モーダルウィンドウがふわっと拡大しながら表示・非表示になる開閉演出。","cssCode":".modal-overlay {\n  position: fixed;\n  inset: 0;\n  background: rgba(0, 0, 0, 0.5);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  opacity: 0;\n  visibility: hidden;\n  transition: opacity 0.3s ease, visibility 0.3s;\n}\n.modal-overlay.is-open {\n  opacity: 1;\n  visibility: visible;\n}\n.modal-box {\n  background: #fff;\n  padding: 24px 32px;\n  border-radius: 10px;\n  text-align: center;\n  transform: scale(0.9);\n  opacity: 0;\n  transition: transform 0.3s ease, opacity 0.3s ease;\n}\n.modal-overlay.is-open .modal-box {\n  transform: scale(1);\n  opacity: 1;\n}","htmlSnippet":"<button class=\"modal-open-btn\">Open Modal</button>\n<div class=\"modal-overlay\">\n  <div class=\"modal-box\">Sample Modal<br><button class=\"modal-close-btn\">Close</button></div>\n</div>","jsCode":"const overlay = document.querySelector(\".modal-overlay\");\ndocument.querySelector(\".modal-open-btn\").addEventListener(\"click\", () => overlay.classList.add(\"is-open\"));\ndocument.querySelector(\".modal-close-btn\").addEventListener(\"click\", () => overlay.classList.remove(\"is-open\"));","tags":["ui","modal","基本"],"useCase":"予約フォーム・画像拡大などのモーダル表示","moodTags":["シンプル","オシャレ"]},{"slug":"sticky-cta-bar-slideup","name":"スマホ固定CTAバー","category":"cta","description":"スマホ画面下部に、スクロール後にスライドインして固定表示されるCTAバー。","cssCode":".sticky-cta-bar {\n  position: fixed;\n  left: 0;\n  right: 0;\n  bottom: 0;\n  background: #1a1a1a;\n  padding: 14px;\n  text-align: center;\n  transform: translateY(100%);\n  transition: transform 0.4s ease;\n  z-index: 900;\n}\n.sticky-cta-bar a {\n  color: #fff;\n  text-decoration: none;\n  font-weight: 600;\n}\n.sticky-cta-bar.is-visible {\n  transform: translateY(0);\n}","htmlSnippet":"<div class=\"sticky-cta-bar\"><a href=\"#reserve\">Sample</a></div>","jsCode":"window.addEventListener(\"scroll\", () => {\n  document.querySelector(\".sticky-cta-bar\").classList.toggle(\"is-visible\", window.scrollY > 300);\n});","tags":["cta","sticky","mobile","予約","基本"],"useCase":"LPのスマホ固定CTAバー(予約・購入導線)","moodTags":["見やすい","派手"]},{"slug":"input-underline-focus","name":"フォーム入力欄フォーカス下線","category":"form","description":"フォーム入力欄にフォーカスすると、下線がアクセントカラーで左から伸びる。","cssCode":".input-underline {\n  border: none;\n  border-bottom: 2px solid #ddd;\n  background: transparent;\n  padding: 8px 0;\n  width: 100%;\n  box-sizing: border-box;\n  font-size: 14px;\n}\n.input-wrap {\n  position: relative;\n  width: 220px;\n}\n.input-wrap::after {\n  content: \"\";\n  position: absolute;\n  left: 0;\n  bottom: 0;\n  width: 100%;\n  height: 2px;\n  background: #1a1a1a;\n  transform: scaleX(0);\n  transform-origin: left;\n  transition: transform 0.3s ease;\n}\n.input-wrap:has(.input-underline:focus)::after {\n  transform: scaleX(1);\n}","htmlSnippet":"<div class=\"input-wrap\">\n  <input class=\"input-underline\" type=\"text\" placeholder=\"Sample\">\n</div>","jsCode":null,"tags":["form","input","focus","基本"],"useCase":"予約フォーム・お問い合わせフォームの入力欄","moodTags":["シンプル","見やすい"]},{"slug":"tab-switch-fade","name":"タブ切り替えフェード","category":"ui","description":"タブ切り替え時に、コンテンツがフェードでクロスフェード表示される。","cssCode":".tab-button {\n  border: none;\n  background: #eee;\n  padding: 8px 16px;\n  cursor: pointer;\n  border-radius: 6px 6px 0 0;\n}\n.tab-panel {\n  display: none;\n  opacity: 0;\n  padding: 12px;\n  animation: tabFadeIn 0.3s ease forwards;\n}\n.tab-panel.is-active {\n  display: block;\n}\n@keyframes tabFadeIn {\n  to { opacity: 1; }\n}","htmlSnippet":"<div class=\"tab-buttons\">\n  <button class=\"tab-button\" data-target=\"panel-1\">Tab 1</button>\n  <button class=\"tab-button\" data-target=\"panel-2\">Tab 2</button>\n</div>\n<div class=\"tab-panel is-active\" id=\"panel-1\">Sample content 1</div>\n<div class=\"tab-panel\" id=\"panel-2\">Sample content 2</div>","jsCode":"document.querySelectorAll(\".tab-button\").forEach((btn) => {\n  btn.addEventListener(\"click\", () => {\n    document.querySelectorAll(\".tab-panel\").forEach((p) => p.classList.remove(\"is-active\"));\n    document.getElementById(btn.dataset.target).classList.add(\"is-active\");\n  });\n});","tags":["ui","tab","基本"],"useCase":"料金プラン比較、サービス内容タブ切り替え","moodTags":["シンプル","見やすい"]},{"slug":"custom-checkbox","name":"カスタムチェックボックス","category":"form","description":"チェックボックスをカスタムデザインし、チェック時にチェックマークがふわっと表示される。","cssCode":".custom-checkbox {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  cursor: pointer;\n  user-select: none;\n}\n.custom-checkbox input {\n  position: absolute;\n  opacity: 0;\n  width: 0;\n  height: 0;\n}\n.custom-checkbox .box {\n  width: 22px;\n  height: 22px;\n  border: 2px solid #ccc;\n  border-radius: 6px;\n  position: relative;\n  flex-shrink: 0;\n  transition: background 0.2s ease, border-color 0.2s ease;\n}\n.custom-checkbox .box::after {\n  content: \"\";\n  position: absolute;\n  left: 6px;\n  top: 2px;\n  width: 6px;\n  height: 11px;\n  border: solid #fff;\n  border-width: 0 2px 2px 0;\n  transform: rotate(45deg) scale(0);\n  transition: transform 0.2s ease;\n}\n.custom-checkbox input:checked ~ .box {\n  background: #1a1a1a;\n  border-color: #1a1a1a;\n}\n.custom-checkbox input:checked ~ .box::after {\n  transform: rotate(45deg) scale(1);\n}","htmlSnippet":"<label class=\"custom-checkbox\">\n  <input type=\"checkbox\" checked>\n  <span class=\"box\"></span>\n  Sample\n</label>","jsCode":null,"tags":["form","checkbox","ui-ux","基本"],"useCase":"予約フォームの同意チェック、複数選択オプション","moodTags":["シンプル","見やすい"]},{"slug":"custom-radio-button","name":"カスタムラジオボタン","category":"form","description":"ラジオボタンをカスタムデザインし、選択時に中央のドットがふわっと拡大表示される。","cssCode":".custom-radio {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  margin-right: 16px;\n  cursor: pointer;\n  user-select: none;\n}\n.custom-radio input {\n  position: absolute;\n  opacity: 0;\n  width: 0;\n  height: 0;\n}\n.custom-radio .dot-ring {\n  width: 22px;\n  height: 22px;\n  border: 2px solid #ccc;\n  border-radius: 50%;\n  position: relative;\n  flex-shrink: 0;\n  transition: border-color 0.2s ease;\n}\n.custom-radio .dot-ring::after {\n  content: \"\";\n  position: absolute;\n  inset: 4px;\n  border-radius: 50%;\n  background: #1a1a1a;\n  transform: scale(0);\n  transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);\n}\n.custom-radio input:checked ~ .dot-ring {\n  border-color: #1a1a1a;\n}\n.custom-radio input:checked ~ .dot-ring::after {\n  transform: scale(1);\n}","htmlSnippet":"<label class=\"custom-radio\">\n  <input type=\"radio\" name=\"sample-radio\" checked>\n  <span class=\"dot-ring\"></span>\n  Sample A\n</label>\n<label class=\"custom-radio\">\n  <input type=\"radio\" name=\"sample-radio\">\n  <span class=\"dot-ring\"></span>\n  Sample B\n</label>","jsCode":null,"tags":["form","radio","ui-ux","基本"],"useCase":"プラン選択、コース選択などの単一選択項目","moodTags":["シンプル","見やすい"]},{"slug":"toggle-switch","name":"トグルスイッチ","category":"form","description":"iOSのようなスライド式トグルスイッチ。ON/OFF切り替えがなめらかにアニメーションする。","cssCode":".toggle-switch {\n  display: inline-block;\n  width: 48px;\n  height: 26px;\n  position: relative;\n  cursor: pointer;\n}\n.toggle-switch input {\n  position: absolute;\n  opacity: 0;\n  width: 0;\n  height: 0;\n}\n.toggle-switch .track {\n  position: absolute;\n  inset: 0;\n  background: #ccc;\n  border-radius: 999px;\n  transition: background 0.25s ease;\n}\n.toggle-switch .track::after {\n  content: \"\";\n  position: absolute;\n  left: 3px;\n  top: 3px;\n  width: 20px;\n  height: 20px;\n  background: #fff;\n  border-radius: 50%;\n  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);\n}\n.toggle-switch input:checked ~ .track {\n  background: #2cb67d;\n}\n.toggle-switch input:checked ~ .track::after {\n  transform: translateX(22px);\n}","htmlSnippet":"<label class=\"toggle-switch\">\n  <input type=\"checkbox\" checked>\n  <span class=\"track\"></span>\n</label>","jsCode":null,"tags":["form","toggle","switch","ui-ux","基本"],"useCase":"通知ON/OFF、オプション有無の切り替えUI","moodTags":["シンプル","見やすい"]},{"slug":"range-slider-custom","name":"カスタムレンジスライダー","category":"form","description":"レンジスライダーのつまみをカスタムデザインし、ホバー・ドラッグ時にふわっと拡大する。","cssCode":".range-slider {\n  -webkit-appearance: none;\n  appearance: none;\n  width: 220px;\n  height: 4px;\n  background: #ddd;\n  border-radius: 999px;\n  outline: none;\n}\n.range-slider::-webkit-slider-thumb {\n  -webkit-appearance: none;\n  width: 18px;\n  height: 18px;\n  border-radius: 50%;\n  background: #1a1a1a;\n  cursor: pointer;\n  transition: transform 0.2s ease;\n}\n.range-slider:hover::-webkit-slider-thumb,\n.range-slider:active::-webkit-slider-thumb {\n  transform: scale(1.3);\n}\n.range-slider::-moz-range-thumb {\n  width: 18px;\n  height: 18px;\n  border-radius: 50%;\n  background: #1a1a1a;\n  border: none;\n  cursor: pointer;\n  transition: transform 0.2s ease;\n}","htmlSnippet":"<input type=\"range\" class=\"range-slider\" min=\"0\" max=\"100\" value=\"50\">","jsCode":null,"tags":["form","range","slider","ui-ux","基本"],"useCase":"予算・回数・年齢などの数値選択UI","moodTags":["シンプル","見やすい"]},{"slug":"star-rating-input","name":"星評価入力","category":"form","description":"星をホバー・クリックすると、その位置まで金色に塗りつぶされる評価入力UI。","cssCode":".star-rating {\n  display: inline-flex;\n  flex-direction: row-reverse;\n  gap: 4px;\n}\n.star-rating input {\n  display: none;\n}\n.star-rating label {\n  font-size: 28px;\n  color: #ddd;\n  cursor: pointer;\n  transition: color 0.15s ease, transform 0.15s ease;\n}\n.star-rating input:checked ~ label,\n.star-rating label:hover,\n.star-rating label:hover ~ label {\n  color: #f5a623;\n  transform: scale(1.1);\n}","htmlSnippet":"<div class=\"star-rating\">\n  <input type=\"radio\" name=\"sample-rating\" id=\"star5\"><label for=\"star5\">★</label>\n  <input type=\"radio\" name=\"sample-rating\" id=\"star4\" checked><label for=\"star4\">★</label>\n  <input type=\"radio\" name=\"sample-rating\" id=\"star3\"><label for=\"star3\">★</label>\n  <input type=\"radio\" name=\"sample-rating\" id=\"star2\"><label for=\"star2\">★</label>\n  <input type=\"radio\" name=\"sample-rating\" id=\"star1\"><label for=\"star1\">★</label>\n</div>","jsCode":null,"tags":["form","rating","star","ui-ux","基本"],"useCase":"レビュー投稿・満足度アンケートの評価入力","moodTags":["ポップ","見やすい"]},{"slug":"segmented-control","name":"セグメントコントロール","category":"ui","description":"選択中の項目にハイライトがなめらかにスライド移動する、iOS風のセグメントコントロール。","cssCode":".segmented-control {\n  display: inline-flex;\n  position: relative;\n  background: #eee;\n  border-radius: 10px;\n  padding: 4px;\n}\n.segmented-control input {\n  display: none;\n}\n.segmented-control label {\n  position: relative;\n  z-index: 1;\n  padding: 8px 20px;\n  cursor: pointer;\n  font-size: 13px;\n  color: #666;\n  transition: color 0.25s ease;\n}\n.segmented-control input:checked + label {\n  color: #1a1a1a;\n}\n.segmented-control .highlight {\n  position: absolute;\n  top: 4px;\n  bottom: 4px;\n  left: 4px;\n  width: calc(33.333% - 4px);\n  background: #fff;\n  border-radius: 8px;\n  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);\n  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);\n}","htmlSnippet":"<div class=\"segmented-control\">\n  <span class=\"highlight\"></span>\n  <input type=\"radio\" name=\"segment\" id=\"seg1\" checked><label for=\"seg1\">Sample A</label>\n  <input type=\"radio\" name=\"segment\" id=\"seg2\"><label for=\"seg2\">Sample B</label>\n  <input type=\"radio\" name=\"segment\" id=\"seg3\"><label for=\"seg3\">Sample C</label>\n</div>","jsCode":"const inputs = document.querySelectorAll(\".segmented-control input\");\nconst highlight = document.querySelector(\".segmented-control .highlight\");\ninputs.forEach((input, i) => {\n  input.addEventListener(\"change\", () => {\n    highlight.style.transform = `translateX(${i * 100}%)`;\n  });\n});","tags":["ui","segmented-control","ui-ux","基本"],"useCase":"料金プランの月額/年額切り替え、表示形式の切り替え","moodTags":["オシャレ","見やすい"]},{"slug":"custom-select-dropdown","name":"カスタムセレクトボックス","category":"ui","description":"セレクトボックスのカスタムデザイン。開閉時に矢印が回転し、メニューが滑らかに開く。","cssCode":".custom-select {\n  position: relative;\n  width: 220px;\n  font-size: 14px;\n}\n.custom-select .selected {\n  border: 1px solid #ccc;\n  border-radius: 8px;\n  padding: 10px 14px;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  cursor: pointer;\n}\n.custom-select .selected::after {\n  content: \"▾\";\n  transition: transform 0.25s ease;\n}\n.custom-select.is-open .selected::after {\n  transform: rotate(180deg);\n}\n.custom-select .options {\n  position: absolute;\n  top: calc(100% + 6px);\n  left: 0;\n  right: 0;\n  background: #fff;\n  border: 1px solid #ddd;\n  border-radius: 8px;\n  overflow: hidden;\n  max-height: 0;\n  opacity: 0;\n  transition: max-height 0.25s ease, opacity 0.2s ease;\n}\n.custom-select.is-open .options {\n  max-height: 200px;\n  opacity: 1;\n}\n.custom-select .options div {\n  padding: 10px 14px;\n  cursor: pointer;\n}\n.custom-select .options div:hover {\n  background: #f5f5f5;\n}","htmlSnippet":"<div class=\"custom-select\">\n  <div class=\"selected\">Sample を選択</div>\n  <div class=\"options\">\n    <div>Sample A</div>\n    <div>Sample B</div>\n    <div>Sample C</div>\n  </div>\n</div>","jsCode":"const select = document.querySelector(\".custom-select\");\nconst selected = select.querySelector(\".selected\");\nselected.addEventListener(\"click\", () => select.classList.toggle(\"is-open\"));\nselect.querySelectorAll(\".options div\").forEach((option) => {\n  option.addEventListener(\"click\", () => {\n    selected.textContent = option.textContent;\n    select.classList.remove(\"is-open\");\n  });\n});","tags":["ui","select","dropdown","ui-ux","基本"],"useCase":"フォームの選択項目(コース・時間帯など)","moodTags":["シンプル","オシャレ"]},{"slug":"custom-radio-card","name":"カード型ラジオボタン","category":"form","description":"プラン選択などで使う、選択中のカードが縁取りとチェックアイコンで強調されるカード型ラジオボタン。","cssCode":".radio-card-group {\n  display: flex;\n  gap: 12px;\n}\n.radio-card {\n  position: relative;\n  cursor: pointer;\n}\n.radio-card input {\n  position: absolute;\n  opacity: 0;\n}\n.radio-card .card-face {\n  display: block;\n  padding: 20px;\n  border: 2px solid #e0e0e0;\n  border-radius: 10px;\n  min-width: 100px;\n  text-align: center;\n  position: relative;\n  transition: border-color 0.2s ease, transform 0.2s ease;\n}\n.radio-card .card-face::after {\n  content: \"\";\n  position: absolute;\n  top: 8px;\n  right: 8px;\n  width: 18px;\n  height: 18px;\n  border-radius: 50%;\n  border: 2px solid #ccc;\n  transition: background 0.2s ease, border-color 0.2s ease;\n}\n.radio-card input:checked ~ .card-face {\n  border-color: #1a1a1a;\n  transform: translateY(-2px);\n}\n.radio-card input:checked ~ .card-face::after {\n  background: #1a1a1a;\n  border-color: #1a1a1a;\n}","htmlSnippet":"<div class=\"radio-card-group\">\n  <label class=\"radio-card\">\n    <input type=\"radio\" name=\"plan\" checked>\n    <span class=\"card-face\">Sample A</span>\n  </label>\n  <label class=\"radio-card\">\n    <input type=\"radio\" name=\"plan\">\n    <span class=\"card-face\">Sample B</span>\n  </label>\n</div>","jsCode":null,"tags":["form","radio-card","plan","ui-ux","基本"],"useCase":"料金プラン・コース選択のカードUI","moodTags":["オシャレ","見やすい"]},{"slug":"bottom-sheet-slide-up","name":"ボトムシート（下からせり上がるシート）","category":"ui","description":"画面下からスライドインするアクションシート。背景を暗くしてフォーカスさせる","cssCode":".bottom-sheet-backdrop {\n  position: fixed;\n  inset: 0;\n  background: rgba(0, 0, 0, 0);\n  visibility: hidden;\n  transition: background 0.3s ease, visibility 0.3s;\n  z-index: 100;\n}\n.bottom-sheet-backdrop.is-open {\n  background: rgba(0, 0, 0, 0.4);\n  visibility: visible;\n}\n.bottom-sheet {\n  position: fixed;\n  left: 0;\n  right: 0;\n  bottom: 0;\n  max-width: 480px;\n  margin: 0 auto;\n  background: #fff;\n  border-radius: 16px 16px 0 0;\n  padding: 12px 20px calc(20px + env(safe-area-inset-bottom));\n  transform: translateY(100%);\n  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);\n  z-index: 101;\n}\n.bottom-sheet.is-open {\n  transform: translateY(0);\n}\n.bottom-sheet-handle {\n  width: 36px;\n  height: 4px;\n  background: #d0d0d0;\n  border-radius: 2px;\n  margin: 0 auto 16px;\n}","htmlSnippet":"<div class=\"bottom-sheet-backdrop\" data-sheet-backdrop></div>\n<div class=\"bottom-sheet\" data-sheet>\n  <div class=\"bottom-sheet-handle\"></div>\n  <p>ここにフィルターや詳細メニューを配置</p>\n</div>\n<button data-sheet-open>開く</button>","jsCode":"const backdrop = document.querySelector(\"[data-sheet-backdrop]\");\nconst sheet = document.querySelector(\"[data-sheet]\");\nconst openBtn = document.querySelector(\"[data-sheet-open]\");\n\nfunction openSheet() {\n  backdrop.classList.add(\"is-open\");\n  sheet.classList.add(\"is-open\");\n}\nfunction closeSheet() {\n  backdrop.classList.remove(\"is-open\");\n  sheet.classList.remove(\"is-open\");\n}\n\nopenBtn.addEventListener(\"click\", openSheet);\nbackdrop.addEventListener(\"click\", closeSheet);","tags":["ボトムシート","モーダル","スマホUI"],"useCase":"スマホ画面下からのフィルター選択・詳細メニュー・アクションシート（EC/予約サイトの絞り込みUIなど）","moodTags":["モダン","スマホライク"]},{"slug":"carousel-swipe-snap","name":"スワイプカルーセル（スナップ+ドット）","category":"ui","description":"横スワイプでスナップするカードカルーセル。現在位置をドットで表示","cssCode":".carousel-track {\n  display: flex;\n  overflow-x: auto;\n  scroll-snap-type: x mandatory;\n  gap: 12px;\n  -webkit-overflow-scrolling: touch;\n  scrollbar-width: none;\n  padding: 0 24px;\n}\n.carousel-track::-webkit-scrollbar {\n  display: none;\n}\n.carousel-slide {\n  flex: 0 0 85%;\n  scroll-snap-align: center;\n  border-radius: 12px;\n  overflow: hidden;\n}\n.carousel-dots {\n  display: flex;\n  justify-content: center;\n  gap: 6px;\n  margin-top: 14px;\n}\n.carousel-dot {\n  width: 6px;\n  height: 6px;\n  border-radius: 50%;\n  background: #d8d8d8;\n  transition: background 0.2s ease, transform 0.2s ease;\n}\n.carousel-dot.is-active {\n  background: #333;\n  transform: scale(1.4);\n}","htmlSnippet":"<div class=\"carousel-track\" data-carousel>\n  <div class=\"carousel-slide\"><img src=\"slide1.jpg\" alt=\"\"></div>\n  <div class=\"carousel-slide\"><img src=\"slide2.jpg\" alt=\"\"></div>\n  <div class=\"carousel-slide\"><img src=\"slide3.jpg\" alt=\"\"></div>\n</div>\n<div class=\"carousel-dots\" data-carousel-dots></div>","jsCode":"const track = document.querySelector(\"[data-carousel]\");\nconst dotsWrap = document.querySelector(\"[data-carousel-dots]\");\nconst slides = [...track.querySelectorAll(\".carousel-slide\")];\n\nslides.forEach((_, i) => {\n  const dot = document.createElement(\"span\");\n  dot.className = \"carousel-dot\" + (i === 0 ? \" is-active\" : \"\");\n  dotsWrap.appendChild(dot);\n});\nconst dots = [...dotsWrap.children];\n\nconst observer = new IntersectionObserver((entries) => {\n  entries.forEach((entry) => {\n    if (entry.isIntersecting) {\n      const index = slides.indexOf(entry.target);\n      dots.forEach((d, i) => d.classList.toggle(\"is-active\", i === index));\n    }\n  });\n}, { root: track, threshold: 0.6 });\n\nslides.forEach((slide) => observer.observe(slide));","tags":["カルーセル","スワイプ","スマホUI"],"useCase":"商品ギャラリー・お客様の声・実績事例など横スワイプで見せたいコンテンツ（スマホ最適、指1本で操作できる）","moodTags":["モダン","スマホライク"]},{"slug":"icon-like-bounce","name":"いいねアイコンのバウンス演出","category":"icon","description":"ハートアイコンをタップすると弾むように拡大縮小し、色が変わる","cssCode":".like-icon {\n  cursor: pointer;\n  color: #999;\n  transition: color 0.2s ease;\n  transform-origin: center;\n}\n.like-icon.is-liked {\n  color: #e0455f;\n  animation: like-bounce 0.4s ease;\n}\n@keyframes like-bounce {\n  0% {\n    transform: scale(1);\n  }\n  30% {\n    transform: scale(1.35);\n  }\n  55% {\n    transform: scale(0.9);\n  }\n  100% {\n    transform: scale(1);\n  }\n}\n@media (prefers-reduced-motion: reduce) {\n  .like-icon.is-liked {\n    animation: none;\n  }\n}","htmlSnippet":"<button class=\"like-icon\" data-like aria-label=\"いいね\" aria-pressed=\"false\">\n  <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 21s-7.5-4.6-10-9.3C.4 8 2 4.5 5.6 4c2-.3 3.9.6 5 2.2C11.7 4.6 13.6 3.7 15.6 4c3.6.5 5.2 4 3.6 7.7C16.7 16.4 12 21 12 21z\"/></svg>\n</button>","jsCode":"const btn = document.querySelector(\"[data-like]\");\nbtn.addEventListener(\"click\", () => {\n  const liked = btn.classList.toggle(\"is-liked\");\n  btn.setAttribute(\"aria-pressed\", String(liked));\n});","tags":["アイコン","マイクロインタラクション","いいね"],"useCase":"お気に入り登録・レビュー高評価・SNSシェアボタンなど、タップの手応えを演出したい小さなアイコン操作","moodTags":["ポップ","スマホライク"]},{"slug":"step-progress-indicator","name":"ステップ進行インジケーター","category":"progress","description":"現在の入力ステップを横並びのバーで示す。完了・現在・未着手を色分け","cssCode":".step-progress {\n  display: flex;\n  gap: 8px;\n}\n.step-progress-bar {\n  flex: 1;\n  height: 4px;\n  background: #e5e5e5;\n  border-radius: 2px;\n  overflow: hidden;\n}\n.step-progress-bar-fill {\n  height: 100%;\n  width: 0%;\n  background: #a8677c;\n  transition: width 0.5s ease;\n}\n.step-progress-bar.is-complete .step-progress-bar-fill {\n  width: 100%;\n}\n.step-progress-bar.is-current .step-progress-bar-fill {\n  width: 50%;\n}\n.step-progress-labels {\n  display: flex;\n  justify-content: space-between;\n  margin-top: 6px;\n  font-size: 0.75rem;\n  color: #888;\n}","htmlSnippet":"<div class=\"step-progress\">\n  <div class=\"step-progress-bar is-complete\"><div class=\"step-progress-bar-fill\"></div></div>\n  <div class=\"step-progress-bar is-current\"><div class=\"step-progress-bar-fill\"></div></div>\n  <div class=\"step-progress-bar\"><div class=\"step-progress-bar-fill\"></div></div>\n</div>\n<div class=\"step-progress-labels\">\n  <span>お客様情報</span>\n  <span>お支払い</span>\n  <span>確認</span>\n</div>","jsCode":null,"tags":["プログレス","ステップ","フォーム"],"useCase":"予約・購入フォームや会員登録など複数ステップの入力フローで、今どこにいるかを視覚的に示したい場面","moodTags":["信頼感","モダン"]},{"slug":"tab-underline-slide","name":"タブ下線スライド","category":"navigation","description":"タブ切り替え時に下線がスライドして現在位置を示す","cssCode":".tabs-underline {\n  position: relative;\n  display: flex;\n  border-bottom: 1px solid #eee;\n}\n.tabs-underline button {\n  flex: 1;\n  padding: 12px 8px;\n  border: none;\n  background: none;\n  font-size: 0.95rem;\n  color: #888;\n  cursor: pointer;\n  transition: color 0.2s ease;\n}\n.tabs-underline button.is-active {\n  color: #222;\n  font-weight: 700;\n}\n.tabs-underline-bar {\n  position: absolute;\n  bottom: -1px;\n  height: 2px;\n  background: #a8677c;\n  transition: left 0.3s cubic-bezier(0.65, 0, 0.35, 1), width 0.3s cubic-bezier(0.65, 0, 0.35, 1);\n}","htmlSnippet":"<div class=\"tabs-underline\" data-tabs>\n  <button class=\"is-active\">商品紹介</button>\n  <button>レビュー</button>\n  <button>よくある質問</button>\n  <span class=\"tabs-underline-bar\"></span>\n</div>","jsCode":"const wrap = document.querySelector(\"[data-tabs]\");\nconst buttons = [...wrap.querySelectorAll(\"button\")];\nconst bar = wrap.querySelector(\".tabs-underline-bar\");\n\nfunction moveBar(btn) {\n  bar.style.left = btn.offsetLeft + \"px\";\n  bar.style.width = btn.offsetWidth + \"px\";\n}\n\nbuttons.forEach((btn) => {\n  btn.addEventListener(\"click\", () => {\n    buttons.forEach((b) => b.classList.remove(\"is-active\"));\n    btn.classList.add(\"is-active\");\n    moveBar(btn);\n  });\n});\n\nmoveBar(wrap.querySelector(\".is-active\"));","tags":["タブ","ナビゲーション","下線"],"useCase":"料金プラン比較・商品詳細/レビュー切り替え・FAQカテゴリなどタブUIの現在位置表示","moodTags":["モダン","信頼感"]},{"slug":"before-after-slider","name":"ビフォーアフター比較スライダー","category":"image","description":"ドラッグで境界線を動かし、施術前後や効果の比較を見せる","cssCode":".ba-slider {\n  position: relative;\n  width: 100%;\n  aspect-ratio: 4 / 3;\n  overflow: hidden;\n  border-radius: 8px;\n  user-select: none;\n}\n.ba-slider img {\n  position: absolute;\n  inset: 0;\n  width: 100%;\n  height: 100%;\n  object-fit: cover;\n  display: block;\n}\n.ba-slider-after {\n  clip-path: inset(0 0 0 50%);\n}\n.ba-slider-handle {\n  position: absolute;\n  top: 0;\n  bottom: 0;\n  left: 50%;\n  width: 3px;\n  background: #fff;\n  transform: translateX(-50%);\n  cursor: ew-resize;\n  box-shadow: 0 0 6px rgba(0, 0, 0, 0.4);\n}\n.ba-slider-handle::after {\n  content: \"\";\n  position: absolute;\n  top: 50%;\n  left: 50%;\n  width: 40px;\n  height: 40px;\n  background: #fff;\n  border-radius: 50%;\n  transform: translate(-50%, -50%);\n  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);\n}\n.ba-slider-label {\n  position: absolute;\n  top: 12px;\n  background: rgba(0, 0, 0, 0.5);\n  color: #fff;\n  font-size: 0.75rem;\n  padding: 4px 10px;\n  border-radius: 999px;\n}\n.ba-slider-label--before { left: 12px; }\n.ba-slider-label--after { right: 12px; }","htmlSnippet":"<div class=\"ba-slider\" data-ba-slider>\n  <img class=\"ba-slider-before\" src=\"before.jpg\" alt=\"施術前\">\n  <img class=\"ba-slider-after\" data-ba-after src=\"after.jpg\" alt=\"施術後\">\n  <span class=\"ba-slider-label ba-slider-label--before\">Before</span>\n  <span class=\"ba-slider-label ba-slider-label--after\">After</span>\n  <div class=\"ba-slider-handle\" data-ba-handle></div>\n</div>","jsCode":"const slider = document.querySelector(\"[data-ba-slider]\");\nconst after = document.querySelector(\"[data-ba-after]\");\nconst handle = document.querySelector(\"[data-ba-handle]\");\nlet dragging = false;\n\nfunction setPosition(clientX) {\n  const rect = slider.getBoundingClientRect();\n  const percent = Math.min(100, Math.max(0, ((clientX - rect.left) / rect.width) * 100));\n  after.style.clipPath = `inset(0 0 0 ${percent}%)`;\n  handle.style.left = percent + \"%\";\n}\n\nhandle.addEventListener(\"pointerdown\", () => { dragging = true; });\nwindow.addEventListener(\"pointerup\", () => { dragging = false; });\nwindow.addEventListener(\"pointermove\", (e) => {\n  if (dragging) setPosition(e.clientX);\n});\nslider.addEventListener(\"click\", (e) => setPosition(e.clientX));","tags":["ビフォーアフター","比較","美容","ドラッグ"],"useCase":"美容・スキンケア・エステ・リフォームなど施術/効果の前後比較を見せたいセクション（美容LPで特に効果的）","moodTags":["信頼感","上品"]},{"slug":"magnetic-button-hover","name":"マグネティックボタン（カーソル追従CTA）","category":"button","description":"カーソルを近づけるとボタンが吸い寄せられるように少し動く。Awwwards系サイトで定番の演出","cssCode":".magnetic-btn {\n  display: inline-block;\n  padding: 16px 36px;\n  border-radius: 999px;\n  background: #1a1a1a;\n  color: #fff;\n  border: none;\n  cursor: pointer;\n  transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);\n  will-change: transform;\n}\n@media (prefers-reduced-motion: reduce) {\n  .magnetic-btn {\n    transition: none;\n  }\n}","htmlSnippet":"<button class=\"magnetic-btn\" data-magnetic>お問い合わせ</button>","jsCode":"const btn = document.querySelector(\"[data-magnetic]\");\nconst strength = 0.35;\n\nbtn.addEventListener(\"mousemove\", (e) => {\n  const rect = btn.getBoundingClientRect();\n  const x = e.clientX - rect.left - rect.width / 2;\n  const y = e.clientY - rect.top - rect.height / 2;\n  btn.style.transform = `translate(${x * strength}px, ${y * strength}px)`;\n});\n\nbtn.addEventListener(\"mouseleave\", () => {\n  btn.style.transform = \"translate(0, 0)\";\n});","tags":["ボタン","マグネティック","CTA","ホバー"],"useCase":"PCでの主要CTAボタン（お問い合わせ・購入・資料請求）にリッチな操作感を出したい場面。タッチデバイスでは効果なし（PC専用の演出）","moodTags":["モダン","カッコイイ"]},{"slug":"sticky-header-shrink","name":"スクロールで縮む固定ヘッダー","category":"navigation","description":"ページ上部では大きいヘッダーが、スクロールすると高さ・余白が縮んでコンパクトな固定ヘッダーに変わる","cssCode":".site-header {\n  position: sticky;\n  top: 0;\n  z-index: 50;\n  background: #fff;\n  padding: 24px 32px;\n  transition: padding 0.3s ease, box-shadow 0.3s ease;\n}\n.site-header.is-shrunk {\n  padding: 10px 32px;\n  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);\n}\n.site-header-logo {\n  display: block;\n  height: 40px;\n  transition: height 0.3s ease;\n}\n.site-header.is-shrunk .site-header-logo {\n  height: 28px;\n}","htmlSnippet":"<header class=\"site-header\" data-sticky-header>\n  <img class=\"site-header-logo\" src=\"logo.svg\" alt=\"ロゴ\">\n</header>","jsCode":"const header = document.querySelector(\"[data-sticky-header]\");\nwindow.addEventListener(\"scroll\", () => {\n  header.classList.toggle(\"is-shrunk\", window.scrollY > 40);\n}, { passive: true });","tags":["ヘッダー","固定ヘッダー","スクロール"],"useCase":"コーポレートサイト・HPのグローバルヘッダー。スクロール後もロゴ・ナビを見せつつ画面占有を減らしたい場面","moodTags":["信頼感","モダン"]},{"slug":"image-curtain-reveal","name":"カーテンワイプ画像リビール","category":"scroll","description":"スクロールで画像にかかった幕が横に開き、中の画像が現れる。Awwwards系サイトで見られる印象的な登場演出","cssCode":".curtain-wrap {\n  position: relative;\n  overflow: hidden;\n  border-radius: 8px;\n}\n.curtain-wrap img {\n  display: block;\n  width: 100%;\n  height: auto;\n}\n.curtain-panel {\n  position: absolute;\n  inset: 0;\n  background: #1a1a1a;\n  transform-origin: left;\n  transform: scaleX(1);\n  transition: transform 1s cubic-bezier(0.83, 0, 0.17, 1);\n}\n.curtain-wrap.is-visible .curtain-panel {\n  transform: scaleX(0);\n}\n@media (prefers-reduced-motion: reduce) {\n  .curtain-panel {\n    transition: none;\n    transform: scaleX(0);\n  }\n}","htmlSnippet":"<div class=\"curtain-wrap reveal-curtain\">\n  <img src=\"photo.jpg\" alt=\"\">\n  <div class=\"curtain-panel\"></div>\n</div>","jsCode":"const observer = new IntersectionObserver((entries) => {\n  entries.forEach((entry) => {\n    if (entry.isIntersecting) {\n      entry.target.classList.add(\"is-visible\");\n      observer.unobserve(entry.target);\n    }\n  });\n}, { threshold: 0.3 });\n\ndocument.querySelectorAll(\".reveal-curtain\").forEach((el) => observer.observe(el));","tags":["スクロール","画像","リビール","カーテン"],"useCase":"ブランディング系LP・HPのキービジュアルや事例写真など、印象的に画像を登場させたいセクション（scroll-fade-upより演出強め）","moodTags":["カッコイイ","ラグジュアリー"]},{"slug":"testimonial-auto-carousel","name":"お客様の声 自動切り替えカルーセル","category":"ui","description":"レビュー・お客様の声のカードが数秒ごとに自動でフェード切り替わる。手動送りボタンも併用可","cssCode":".testimonial-carousel {\n  position: relative;\n  min-height: 160px;\n}\n.testimonial-slide {\n  position: absolute;\n  inset: 0;\n  opacity: 0;\n  transform: translateY(8px);\n  transition: opacity 0.6s ease, transform 0.6s ease;\n  pointer-events: none;\n}\n.testimonial-slide.is-active {\n  opacity: 1;\n  transform: translateY(0);\n  pointer-events: auto;\n}\n.testimonial-dots {\n  display: flex;\n  justify-content: center;\n  gap: 6px;\n  margin-top: 16px;\n}\n.testimonial-dot {\n  width: 6px;\n  height: 6px;\n  border-radius: 50%;\n  background: #ddd;\n  transition: background 0.2s ease;\n}\n.testimonial-dot.is-active {\n  background: #a8677c;\n}","htmlSnippet":"<div class=\"testimonial-carousel\" data-testimonial>\n  <div class=\"testimonial-slide is-active\">「対応が丁寧で安心できました」 - 30代女性</div>\n  <div class=\"testimonial-slide\">「効果を実感できて満足です」 - 40代女性</div>\n  <div class=\"testimonial-slide\">「また利用したいと思います」 - 20代女性</div>\n</div>\n<div class=\"testimonial-dots\" data-testimonial-dots></div>","jsCode":"const wrap = document.querySelector(\"[data-testimonial]\");\nconst dotsWrap = document.querySelector(\"[data-testimonial-dots]\");\nconst slides = [...wrap.querySelectorAll(\".testimonial-slide\")];\n\nslides.forEach((_, i) => {\n  const dot = document.createElement(\"span\");\n  dot.className = \"testimonial-dot\" + (i === 0 ? \" is-active\" : \"\");\n  dotsWrap.appendChild(dot);\n});\nconst dots = [...dotsWrap.children];\n\nlet current = 0;\nfunction show(index) {\n  slides[current].classList.remove(\"is-active\");\n  dots[current].classList.remove(\"is-active\");\n  current = index;\n  slides[current].classList.add(\"is-active\");\n  dots[current].classList.add(\"is-active\");\n}\n\nsetInterval(() => {\n  show((current + 1) % slides.length);\n}, 4000);\n\ndots.forEach((dot, i) => dot.addEventListener(\"click\", () => show(i)));","tags":["カルーセル","お客様の声","レビュー","自動再生"],"useCase":"お客様の声・導入事例・レビューを省スペースで複数見せたいLP/HPのセクション","moodTags":["信頼感","上品"]},{"slug":"gradient-blob-background","name":"有機的に動くグラデーションブロブ背景","category":"background","description":"ふわふわと形を変えながら漂うグラデーションの塊。SaaS系のヒーローセクションで定番の背景演出","cssCode":".blob-wrap {\n  position: relative;\n  overflow: hidden;\n  isolation: isolate;\n}\n.blob {\n  position: absolute;\n  width: 480px;\n  height: 480px;\n  border-radius: 42% 58% 65% 35% / 45% 45% 55% 55%;\n  filter: blur(60px);\n  opacity: 0.55;\n  z-index: -1;\n  animation: blob-move 14s ease-in-out infinite;\n}\n.blob--a {\n  top: -10%;\n  left: -10%;\n  background: #a8677c;\n  animation-delay: 0s;\n}\n.blob--b {\n  bottom: -15%;\n  right: -10%;\n  background: #6c8ea8;\n  animation-delay: -6s;\n}\n@keyframes blob-move {\n  0%, 100% {\n    transform: translate(0, 0) scale(1);\n    border-radius: 42% 58% 65% 35% / 45% 45% 55% 55%;\n  }\n  33% {\n    transform: translate(6%, 8%) scale(1.08);\n    border-radius: 58% 42% 35% 65% / 55% 65% 35% 45%;\n  }\n  66% {\n    transform: translate(-6%, 4%) scale(0.95);\n    border-radius: 35% 65% 55% 45% / 40% 55% 45% 60%;\n  }\n}\n@media (prefers-reduced-motion: reduce) {\n  .blob {\n    animation: none;\n  }\n}","htmlSnippet":"<div class=\"blob-wrap\">\n  <div class=\"blob blob--a\"></div>\n  <div class=\"blob blob--b\"></div>\n  <h1>次世代のクラウドサービス</h1>\n</div>","jsCode":null,"tags":["背景","ブロブ","グラデーション","SaaS"],"useCase":"SaaS・ITサービス系LP/HPのヒーローセクション背景。ミニマルな文字組みに柔らかい動きを添えたい場面","moodTags":["モダン","幻想的"]},{"slug":"notification-badge-ping","name":"通知バッジの点滅（ピン留めドット）","category":"notification","description":"アイコンの右上に赤いドットが波紋のように広がりながら点滅し、未読・新着を知らせる","cssCode":".badge-wrap {\n  position: relative;\n  display: inline-flex;\n}\n.badge-ping {\n  position: absolute;\n  top: -2px;\n  right: -2px;\n  width: 10px;\n  height: 10px;\n}\n.badge-ping::before,\n.badge-ping::after {\n  content: \"\";\n  position: absolute;\n  inset: 0;\n  border-radius: 50%;\n  background: #e0455f;\n}\n.badge-ping::before {\n  animation: badge-ping-wave 1.6s cubic-bezier(0, 0, 0.2, 1) infinite;\n}\n@keyframes badge-ping-wave {\n  0% {\n    transform: scale(1);\n    opacity: 0.7;\n  }\n  100% {\n    transform: scale(2.4);\n    opacity: 0;\n  }\n}\n@media (prefers-reduced-motion: reduce) {\n  .badge-ping::before {\n    animation: none;\n  }\n}","htmlSnippet":"<span class=\"badge-wrap\">\n  <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\"><path d=\"M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.1-1.6-5.6-4.5-6.3V4a1.5 1.5 0 0 0-3 0v.7C7.6 5.4 6 7.9 6 11v5l-2 2v1h16v-1l-2-2z\"/></svg>\n  <span class=\"badge-ping\"></span>\n</span>","jsCode":null,"tags":["通知","バッジ","ピン留め","マイクロインタラクション"],"useCase":"新着メッセージ・お知らせ・カート内商品ありなど、アイコンに小さく注意を引きたい場面","moodTags":["ポップ","モダン"]},{"slug":"bento-grid-hover","name":"Bentoグリッドレイアウト（ホバーで強調）","category":"ui","description":"大小さまざまなサイズのカードを箱詰めのように敷き詰めるBentoグリッド。ホバーしたカードだけ浮き上がる","cssCode":".bento-grid {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  grid-auto-rows: 140px;\n  gap: 16px;\n}\n.bento-item {\n  background: #f4f2ee;\n  border-radius: 16px;\n  padding: 20px;\n  transition: transform 0.25s ease, box-shadow 0.25s ease;\n}\n.bento-item:hover {\n  transform: translateY(-4px);\n  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);\n}\n.bento-item--wide { grid-column: span 2; }\n.bento-item--tall { grid-row: span 2; }\n@media (max-width: 767px) {\n  .bento-grid {\n    grid-template-columns: repeat(2, 1fr);\n  }\n  .bento-item--wide { grid-column: span 2; }\n}","htmlSnippet":"<div class=\"bento-grid\">\n  <div class=\"bento-item bento-item--wide\">機能A</div>\n  <div class=\"bento-item\">機能B</div>\n  <div class=\"bento-item bento-item--tall\">機能C</div>\n  <div class=\"bento-item\">機能D</div>\n  <div class=\"bento-item\">機能E</div>\n</div>","jsCode":null,"tags":["Bento","グリッド","レイアウト","ホバー"],"useCase":"SaaS・サービス紹介LP/HPの機能一覧セクション。大小の情報量が混在する内容を1つの盤面にまとめて見せたい場面","moodTags":["モダン","見やすい"]},{"slug":"countdown-timer","name":"カウントダウンタイマー","category":"ui","description":"残り時間を日・時・分・秒でカウントダウン表示する。数字が切り替わる瞬間に軽くフェードする","cssCode":".countdown {\n  display: flex;\n  gap: 12px;\n}\n.countdown-block {\n  text-align: center;\n}\n.countdown-num {\n  display: inline-block;\n  min-width: 2ch;\n  font-size: 2rem;\n  font-weight: 700;\n  font-variant-numeric: tabular-nums;\n  transition: opacity 0.15s ease;\n}\n.countdown-num.is-flip {\n  opacity: 0.3;\n}\n.countdown-label {\n  display: block;\n  margin-top: 4px;\n  font-size: 0.75rem;\n  color: #888;\n}","htmlSnippet":"<div class=\"countdown\" data-countdown=\"2026-08-01T00:00:00\">\n  <div class=\"countdown-block\"><span class=\"countdown-num\" data-days>00</span><span class=\"countdown-label\">日</span></div>\n  <div class=\"countdown-block\"><span class=\"countdown-num\" data-hours>00</span><span class=\"countdown-label\">時間</span></div>\n  <div class=\"countdown-block\"><span class=\"countdown-num\" data-minutes>00</span><span class=\"countdown-label\">分</span></div>\n  <div class=\"countdown-block\"><span class=\"countdown-num\" data-seconds>00</span><span class=\"countdown-label\">秒</span></div>\n</div>","jsCode":"const el = document.querySelector(\"[data-countdown]\");\nconst target = new Date(el.dataset.countdown).getTime();\nconst daysEl = el.querySelector(\"[data-days]\");\nconst hoursEl = el.querySelector(\"[data-hours]\");\nconst minutesEl = el.querySelector(\"[data-minutes]\");\nconst secondsEl = el.querySelector(\"[data-seconds]\");\n\nfunction pad(n) { return String(n).padStart(2, \"0\"); }\n\nfunction tick() {\n  const diff = Math.max(0, target - Date.now());\n  const days = Math.floor(diff / 86400000);\n  const hours = Math.floor((diff % 86400000) / 3600000);\n  const minutes = Math.floor((diff % 3600000) / 60000);\n  const seconds = Math.floor((diff % 60000) / 1000);\n  daysEl.textContent = pad(days);\n  hoursEl.textContent = pad(hours);\n  minutesEl.textContent = pad(minutes);\n  secondsEl.textContent = pad(seconds);\n}\n\ntick();\nsetInterval(tick, 1000);","tags":["カウントダウン","タイマー","期間限定"],"useCase":"期間限定キャンペーン・セール終了・予約締切など、残り時間を示して行動を促したいCTA周辺（日付は必ず実在の締切に置き換え、根拠のない期間限定表現をしない）","moodTags":["ポップ","緊急感"]},{"slug":"timeline-scroll-draw","name":"スクロール連動タイムライン（線が伸びる）","category":"scroll","description":"縦のタイムライン上を、スクロールに合わせて線が下へ伸びていき、通過したステップがハイライトされる","cssCode":".timeline {\n  position: relative;\n  padding-left: 32px;\n}\n.timeline::before {\n  content: \"\";\n  position: absolute;\n  left: 7px;\n  top: 0;\n  bottom: 0;\n  width: 2px;\n  background: #e5e5e5;\n}\n.timeline-progress {\n  position: absolute;\n  left: 7px;\n  top: 0;\n  width: 2px;\n  height: 0%;\n  background: #a8677c;\n  transition: height 0.2s ease-out;\n}\n.timeline-item {\n  position: relative;\n  padding-bottom: 40px;\n}\n.timeline-dot {\n  position: absolute;\n  left: -32px;\n  top: 2px;\n  width: 16px;\n  height: 16px;\n  border-radius: 50%;\n  background: #fff;\n  border: 2px solid #e5e5e5;\n  transition: border-color 0.3s ease, background 0.3s ease;\n}\n.timeline-item.is-passed .timeline-dot {\n  border-color: #a8677c;\n  background: #a8677c;\n}","htmlSnippet":"<div class=\"timeline\" data-timeline>\n  <div class=\"timeline-progress\" data-timeline-progress></div>\n  <div class=\"timeline-item\"><span class=\"timeline-dot\"></span><h3>ヒアリング</h3><p>ご要望・課題をお伺いします</p></div>\n  <div class=\"timeline-item\"><span class=\"timeline-dot\"></span><h3>ご提案</h3><p>最適なプランをご提案します</p></div>\n  <div class=\"timeline-item\"><span class=\"timeline-dot\"></span><h3>制作・実装</h3><p>デザイン〜実装まで進めます</p></div>\n  <div class=\"timeline-item\"><span class=\"timeline-dot\"></span><h3>納品</h3><p>公開・納品して完了です</p></div>\n</div>","jsCode":"const timeline = document.querySelector(\"[data-timeline]\");\nconst progress = document.querySelector(\"[data-timeline-progress]\");\nconst items = [...timeline.querySelectorAll(\".timeline-item\")];\n\nfunction update() {\n  const rect = timeline.getBoundingClientRect();\n  const viewportCenter = window.innerHeight * 0.6;\n  const percent = Math.min(100, Math.max(0, ((viewportCenter - rect.top) / rect.height) * 100));\n  progress.style.height = percent + \"%\";\n\n  items.forEach((item) => {\n    const itemRect = item.getBoundingClientRect();\n    item.classList.toggle(\"is-passed\", itemRect.top < viewportCenter);\n  });\n}\n\nwindow.addEventListener(\"scroll\", update, { passive: true });\nupdate();","tags":["タイムライン","スクロール","ステップ","導入の流れ"],"useCase":"サービス導入の流れ・制作フロー・沿革紹介など、複数ステップを順に見せたいセクション","moodTags":["信頼感","モダン"]},{"slug":"empty-state-illustration","name":"空状態（Empty State）の案内表示","category":"ui","description":"検索結果0件・カートが空など、何も無い状態でユーザーを迷わせないためのイラスト+文言+CTAをふわっと表示する","cssCode":".empty-state {\n  text-align: center;\n  padding: 60px 24px;\n  opacity: 0;\n  transform: translateY(12px);\n  animation: empty-state-in 0.6s ease forwards;\n}\n@keyframes empty-state-in {\n  to {\n    opacity: 1;\n    transform: translateY(0);\n  }\n}\n.empty-state-icon {\n  width: 64px;\n  height: 64px;\n  margin: 0 auto 16px;\n  opacity: 0.5;\n}\n.empty-state-title {\n  font-weight: 700;\n  margin-bottom: 6px;\n}\n.empty-state-text {\n  color: #888;\n  font-size: 0.9rem;\n  margin-bottom: 20px;\n}\n@media (prefers-reduced-motion: reduce) {\n  .empty-state {\n    animation: none;\n    opacity: 1;\n    transform: none;\n  }\n}","htmlSnippet":"<div class=\"empty-state\">\n  <svg class=\"empty-state-icon\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\"><circle cx=\"11\" cy=\"11\" r=\"7\"/><path d=\"M21 21l-4.35-4.35\"/></svg>\n  <p class=\"empty-state-title\">該当する商品が見つかりませんでした</p>\n  <p class=\"empty-state-text\">条件を変えて再度お試しください</p>\n  <button>絞り込みをリセット</button>\n</div>","jsCode":null,"tags":["空状態","検索結果0件","案内"],"useCase":"EC・検索機能付きサイトで、検索結果0件・カートが空・お気に入り未登録など「何もない」状態を丁寧に案内したい画面","moodTags":["やさしい","見やすい"]},{"slug":"file-upload-dropzone","name":"ドラッグ&ドロップ ファイルアップロード","category":"form","description":"ファイルをドラッグすると枠が光り、ドロップでアップロード進捗バーが伸びる","cssCode":".dropzone {\n  border: 2px dashed #ccc;\n  border-radius: 12px;\n  padding: 40px 20px;\n  text-align: center;\n  color: #888;\n  transition: border-color 0.2s ease, background 0.2s ease;\n  cursor: pointer;\n}\n.dropzone.is-dragover {\n  border-color: #a8677c;\n  background: #faf3f5;\n  color: #a8677c;\n}\n.dropzone-progress {\n  margin-top: 16px;\n  height: 6px;\n  border-radius: 3px;\n  background: #eee;\n  overflow: hidden;\n  display: none;\n}\n.dropzone-progress.is-active {\n  display: block;\n}\n.dropzone-progress-fill {\n  height: 100%;\n  width: 0%;\n  background: #a8677c;\n  transition: width 0.3s ease;\n}","htmlSnippet":"<div class=\"dropzone\" data-dropzone>\n  <p>ここにファイルをドラッグ&ドロップ<br>またはクリックして選択</p>\n  <div class=\"dropzone-progress\" data-progress-wrap>\n    <div class=\"dropzone-progress-fill\" data-progress-fill></div>\n  </div>\n</div>","jsCode":"const zone = document.querySelector(\"[data-dropzone]\");\nconst progressWrap = document.querySelector(\"[data-progress-wrap]\");\nconst progressFill = document.querySelector(\"[data-progress-fill]\");\n\n[\"dragenter\", \"dragover\"].forEach((evt) => {\n  zone.addEventListener(evt, (e) => {\n    e.preventDefault();\n    zone.classList.add(\"is-dragover\");\n  });\n});\n[\"dragleave\", \"drop\"].forEach((evt) => {\n  zone.addEventListener(evt, (e) => {\n    e.preventDefault();\n    zone.classList.remove(\"is-dragover\");\n  });\n});\n\nzone.addEventListener(\"drop\", () => {\n  progressWrap.classList.add(\"is-active\");\n  let percent = 0;\n  const timer = setInterval(() => {\n    percent = Math.min(100, percent + 10);\n    progressFill.style.width = percent + \"%\";\n    if (percent >= 100) clearInterval(timer);\n  }, 120);\n});","tags":["ファイルアップロード","ドラッグ&ドロップ","フォーム"],"useCase":"応募フォームの写真添付・資料アップロードなど、ファイル送信を伴うフォームのUI","moodTags":["モダン","信頼感"]},{"slug":"copy-to-clipboard-feedback","name":"コピーボタンのフィードバック","category":"button","description":"クリックでテキストをコピーし、ボタンの上に「コピーしました」という吹き出しが一瞬表示される","cssCode":".copy-btn-wrap {\n  position: relative;\n  display: inline-flex;\n}\n.copy-tooltip {\n  position: absolute;\n  bottom: 100%;\n  left: 50%;\n  transform: translate(-50%, 4px);\n  margin-bottom: 8px;\n  background: #1a1a1a;\n  color: #fff;\n  font-size: 0.75rem;\n  padding: 4px 10px;\n  border-radius: 6px;\n  white-space: nowrap;\n  opacity: 0;\n  transition: opacity 0.2s ease, transform 0.2s ease;\n  pointer-events: none;\n}\n.copy-tooltip.is-visible {\n  opacity: 1;\n  transform: translate(-50%, 0);\n}","htmlSnippet":"<span class=\"copy-btn-wrap\">\n  <button data-copy-btn data-copy-text=\"https://example.com/invite/abc123\">リンクをコピー</button>\n  <span class=\"copy-tooltip\" data-copy-tooltip>コピーしました</span>\n</span>","jsCode":"const btn = document.querySelector(\"[data-copy-btn]\");\nconst tooltip = document.querySelector(\"[data-copy-tooltip]\");\nlet hideTimer;\n\nbtn.addEventListener(\"click\", async () => {\n  await navigator.clipboard.writeText(btn.dataset.copyText);\n  tooltip.classList.add(\"is-visible\");\n  clearTimeout(hideTimer);\n  hideTimer = setTimeout(() => tooltip.classList.remove(\"is-visible\"), 1500);\n});","tags":["コピー","クリップボード","フィードバック"],"useCase":"紹介リンク・クーポンコード・APIキーなど、コピーして使ってもらいたいテキストのUI","moodTags":["モダン","見やすい"]},{"slug":"pagination-dots-slide","name":"ページネーション（現在地スライド表示）","category":"navigation","description":"ページ番号の下に、現在のページ位置を示す下線/背景がスライドして移動する","cssCode":".pagination {\n  position: relative;\n  display: inline-flex;\n  gap: 4px;\n  padding: 4px;\n  background: #f4f2ee;\n  border-radius: 999px;\n}\n.pagination button {\n  position: relative;\n  z-index: 1;\n  width: 34px;\n  height: 34px;\n  border: none;\n  background: none;\n  border-radius: 50%;\n  font-size: 0.9rem;\n  color: #666;\n  cursor: pointer;\n  transition: color 0.25s ease;\n}\n.pagination button.is-active {\n  color: #fff;\n}\n.pagination-indicator {\n  position: absolute;\n  top: 4px;\n  left: 4px;\n  width: 34px;\n  height: 34px;\n  border-radius: 50%;\n  background: #1a1a1a;\n  transition: transform 0.3s cubic-bezier(0.65, 0, 0.35, 1);\n  z-index: 0;\n}","htmlSnippet":"<div class=\"pagination\" data-pagination>\n  <span class=\"pagination-indicator\" data-pagination-indicator></span>\n  <button class=\"is-active\">1</button>\n  <button>2</button>\n  <button>3</button>\n  <button>4</button>\n</div>","jsCode":"const wrap = document.querySelector(\"[data-pagination]\");\nconst indicator = document.querySelector(\"[data-pagination-indicator]\");\nconst buttons = [...wrap.querySelectorAll(\"button\")];\n\nbuttons.forEach((btn, i) => {\n  btn.addEventListener(\"click\", () => {\n    buttons.forEach((b) => b.classList.remove(\"is-active\"));\n    btn.classList.add(\"is-active\");\n    indicator.style.transform = `translateX(${i * 38}px)`;\n  });\n});","tags":["ページネーション","スライド","ナビゲーション"],"useCase":"ブログ一覧・商品一覧・お知らせ一覧などのページ送りUI","moodTags":["モダン","見やすい"]},{"slug":"photo-stack-hover-fan","name":"重なった写真がホバーで扇状に広がる","category":"image","description":"数枚重ねて置かれた写真に、ホバーすると扇形に少しずつ回転しながら広がる。ポートフォリオ系サイトで見られる見せ方","cssCode":".photo-stack {\n  position: relative;\n  width: 220px;\n  height: 220px;\n}\n.photo-stack img {\n  position: absolute;\n  inset: 0;\n  width: 100%;\n  height: 100%;\n  object-fit: cover;\n  border-radius: 12px;\n  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);\n  transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);\n  transform-origin: bottom center;\n}\n.photo-stack img:nth-child(1) { transform: rotate(0deg); z-index: 3; }\n.photo-stack img:nth-child(2) { transform: rotate(0deg); z-index: 2; }\n.photo-stack img:nth-child(3) { transform: rotate(0deg); z-index: 1; }\n.photo-stack:hover img:nth-child(1) { transform: rotate(-10deg) translateX(-16px); }\n.photo-stack:hover img:nth-child(2) { transform: rotate(0deg) translateY(-6px); }\n.photo-stack:hover img:nth-child(3) { transform: rotate(10deg) translateX(16px); }\n@media (prefers-reduced-motion: reduce) {\n  .photo-stack img {\n    transition: none;\n  }\n}","htmlSnippet":"<div class=\"photo-stack\">\n  <img src=\"photo1.jpg\" alt=\"\">\n  <img src=\"photo2.jpg\" alt=\"\">\n  <img src=\"photo3.jpg\" alt=\"\">\n</div>","jsCode":null,"tags":["写真","ホバー","ポートフォリオ","スタック"],"useCase":"制作実績・お客様事例・ギャラリーなど、複数の写真をコンパクトに1箇所へまとめて見せたいカード","moodTags":["オシャレ","カッコイイ"]},{"slug":"media-filmstrip-strip","name":"横並びフィルムストリップ（自動スクロール帯）","category":"装飾","description":"ヒーロー下部などに、実績写真や商品写真を横一列に並べた帯をゆっくり自動スクロールさせる（marquee-loopの画像版）","cssCode":".filmstrip {\n  overflow: hidden;\n  width: 100%;\n  -webkit-mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);\n  mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);\n}\n.filmstrip-track {\n  display: flex;\n  gap: 12px;\n  width: max-content;\n  animation: filmstrip-scroll 30s linear infinite;\n}\n.filmstrip-track img {\n  height: 120px;\n  width: auto;\n  border-radius: 8px;\n  display: block;\n}\n@keyframes filmstrip-scroll {\n  from { transform: translateX(0); }\n  to { transform: translateX(-50%); }\n}\n.filmstrip:hover .filmstrip-track {\n  animation-play-state: paused;\n}\n@media (prefers-reduced-motion: reduce) {\n  .filmstrip-track {\n    animation: none;\n  }\n}","htmlSnippet":"<div class=\"filmstrip\">\n  <div class=\"filmstrip-track\">\n    <img src=\"work1.jpg\" alt=\"\">\n    <img src=\"work2.jpg\" alt=\"\">\n    <img src=\"work3.jpg\" alt=\"\">\n    <img src=\"work1.jpg\" alt=\"\">\n    <img src=\"work2.jpg\" alt=\"\">\n    <img src=\"work3.jpg\" alt=\"\">\n  </div>\n</div>","jsCode":null,"tags":["フィルムストリップ","自動スクロール","ギャラリー"],"useCase":"ヒーロー直下やフッター付近で、制作実績・商品ラインナップを一覧的に流し見せたいセクション（画像は同じ配列を2連結してループ）","moodTags":["モダン","カッコイイ"]},{"slug":"light-beam-glow-bg","name":"斜めに差し込む光の筋（背景演出）","category":"background","description":"暗い背景に、斜めのグラデーション光がゆっくり明滅しながら差し込む。SaaS系の重厚なヒーロー背景で定番","cssCode":".beam-wrap {\n  position: relative;\n  overflow: hidden;\n  background: #0b0e14;\n  isolation: isolate;\n}\n.beam {\n  position: absolute;\n  top: -20%;\n  width: 2px;\n  height: 140%;\n  background: linear-gradient(180deg, transparent, rgba(168, 140, 255, 0.6), transparent);\n  filter: blur(1px);\n  transform: rotate(20deg);\n  animation: beam-glow 4s ease-in-out infinite;\n  z-index: -1;\n}\n.beam--1 { left: 20%; animation-delay: 0s; }\n.beam--2 { left: 50%; animation-delay: 1.3s; }\n.beam--3 { left: 78%; animation-delay: 2.6s; }\n@keyframes beam-glow {\n  0%, 100% { opacity: 0.15; }\n  50% { opacity: 0.8; }\n}\n@media (prefers-reduced-motion: reduce) {\n  .beam {\n    animation: none;\n    opacity: 0.4;\n  }\n}","htmlSnippet":"<div class=\"beam-wrap\">\n  <span class=\"beam beam--1\"></span>\n  <span class=\"beam beam--2\"></span>\n  <span class=\"beam beam--3\"></span>\n  <h1>次世代のセキュリティ基盤</h1>\n</div>","jsCode":null,"tags":["背景","光","グロー","SaaS"],"useCase":"SaaS・セキュリティ・テクノロジー系LP/HPの暗いヒーローセクションに重厚感・先進感を出したい場面","moodTags":["カッコイイ","モダン"]}]</script>

      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function buildIframeDoc(entry) {
    var needsScrollFiller = scrollDemoSlugs.indexOf(entry.slug) !== -1;
    var config = scrollDemoConfig[entry.slug] || { top: 120, bottom: 80 };
    var fillerTop = needsScrollFiller
      ? '<div style="height:' + config.top + 'px;"></div>'
      : "";
    var fillerBottom = needsScrollFiller ? '<div style="height:' + config.bottom + 'px;"></div>' : "";
    var justify = needsScrollFiller ? "flex-start" : "center";

    // 自動スクロールはしない。ユーザーが実際にiframe内をスクロールした時だけ動く。
    var autoScrollScript = "";

    return "<!doctype html><html><head><meta charset=\"UTF-8\"><style>"
      + "body{margin:0;min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:" + justify + ";font-family:-apple-system,sans-serif;background:#fafafa;padding:16px;box-sizing:border-box;}"
      + (entry.cssCode || "")
      + (autoDemoStyles[entry.slug] || "")
      + (demoExtraStyles[entry.slug] || "")
      + "</style></head><body>"
      + fillerTop
      + (entry.htmlSnippet || "")
      + (demoExtraHtml[entry.slug] || "")
      + fillerBottom
      + "<script>" + (entry.jsCode || "") + ";" + (autoDemoScripts[entry.slug] || "") + (demoExtraScripts[entry.slug] || "") + autoScrollScript + "<\/script>"
      + "</body></html>";
  }

  var grouped = {};
  var order = [];
  animations.forEach(function (entry) {
    if (!grouped[entry.category]) {
      grouped[entry.category] = [];
      order.push(entry.category);
    }
    grouped[entry.category].push(entry);
  });

  var root = document.getElementById("root");

  order.forEach(function (category) {
    var items = grouped[category];

    var h2 = document.createElement("h2");
    h2.className = "category";
    h2.textContent = (categoryLabels[category] || category) + " (" + items.length + ")";
    root.appendChild(h2);

    var grid = document.createElement("div");
    grid.className = "grid";

    items.forEach(function (entry) {
      var moods = entry.moodTags || [];
      var card = document.createElement("div");
      card.className = "card";
      card.dataset.moods = entry.category;

      var demo = document.createElement("div");
      demo.className = "demo";

      var iframe = document.createElement("iframe");
      iframe.srcdoc = buildIframeDoc(entry);
      demo.appendChild(iframe);

      setInterval(function () {
        iframe.srcdoc = buildIframeDoc(entry);
      }, 12000);

      demo.addEventListener("mouseenter", function () {
        iframe.srcdoc = buildIframeDoc(entry);
      });

      var replay = document.createElement("button");
      replay.className = "replay";
      replay.textContent = "再生";
      replay.addEventListener("click", function () {
        iframe.srcdoc = buildIframeDoc(entry);
      });
      demo.appendChild(replay);

      if (hoverHintSlugs.indexOf(entry.slug) !== -1) {
        var hint = document.createElement("div");
        hint.className = "hover-hint";
        hint.textContent = "↖ ホバーしてください";
        demo.appendChild(hint);
      }

      if (scrollDemoSlugs.indexOf(entry.slug) !== -1) {
        var scrollHint = document.createElement("div");
        scrollHint.className = "hover-hint";
        scrollHint.textContent = "↓ スクロールしてください";
        demo.appendChild(scrollHint);
      }

      var tagsHtml = (entry.tags || [])
        .map(function (t) { return '<span class="tag">' + escapeHtml(t) + "</span>"; })
        .join("");
      var moodTagsHtml = moods
        .map(function (m) { return '<span class="mood-tag">' + escapeHtml(m) + "</span>"; })
        .join("");
      var useCaseHtml = entry.useCase
        ? '<div class="use-case">用途: ' + escapeHtml(entry.useCase) + "</div>"
        : "";

      var body = document.createElement("div");
      body.className = "cardbody";
      body.innerHTML =
        '<div class="name">' + escapeHtml(entry.name) + "</div>"
        + '<div class="slug">' + escapeHtml(entry.slug) + "</div>"
        + '<div class="desc">' + escapeHtml(entry.description) + "</div>"
        + useCaseHtml
        + '<div class="tags">' + moodTagsHtml + tagsHtml + "</div>";

      card.appendChild(demo);
      card.appendChild(body);
      grid.appendChild(card);
    });

    root.appendChild(grid);
  });

  function applyMoodFilter(mood) {
    activeMood = mood;
    document.querySelectorAll(".mood-filter button").forEach(function (btn) {
      btn.classList.toggle("is-active", btn.dataset.mood === mood);
    });
    document.querySelectorAll(".card").forEach(function (card) {
      var moods = (card.dataset.moods || "").split(",").filter(Boolean);
      var show = mood === "すべて" || moods.indexOf(mood) !== -1;
      card.classList.toggle("is-hidden", !show);
    });
    document.querySelectorAll(".category").forEach(function (h2) {
      var grid = h2.nextElementSibling;
      var visibleCount = Array.prototype.filter.call(grid.children, function (card) {
        return !card.classList.contains("is-hidden");
      }).length;
      var showSection = visibleCount > 0;
      h2.style.display = showSection ? "" : "none";
      grid.style.display = showSection ? "" : "none";
    });
  }

  var filterBar = document.getElementById("mood-filter");
  ["すべて"].concat(moodOrder).forEach(function (mood) {
    var btn = document.createElement("button");
    btn.textContent = mood === "すべて" ? "すべて" : (categoryLabels[mood] || mood);
    btn.dataset.mood = mood;
    if (mood === "すべて") btn.classList.add("is-active");
    btn.addEventListener("click", function () { applyMoodFilter(mood); });
    filterBar.appendChild(btn);
  });
})();
</script>
</body>
</html>
