<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LP Portfolio Gallery</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>LP Portfolio Gallery</h1>
      <p class="page-subtitle">制作したLPを検索・カテゴリ・タグで一覧できるポートフォリオです。</p>
    </header>

    <main>
      <div class="controls">
        <input
          id="search-input"
          type="search"
          placeholder="タイトル・見出し・タグで検索"
          aria-label="LPを検索"
        />
        <div id="category-filters" class="chip-row" role="group" aria-label="カテゴリで絞り込み"></div>
      </div>

      <p id="result-count" class="result-count"></p>

      <div id="card-grid" class="card-grid"></div>
      <p id="empty-state" class="empty-state" hidden>該当するLPが見つかりませんでした。</p>
    </main>

    <div id="preview-modal" class="preview-modal" hidden>
      <div class="preview-modal-backdrop" data-close></div>
      <div class="preview-modal-panel" role="dialog" aria-modal="true" aria-labelledby="preview-modal-title">
        <div class="preview-modal-header">
          <p id="preview-modal-title" class="preview-modal-title"></p>
          <div class="device-toggle" role="group" aria-label="PC/スマホ表示切り替え">
            <button type="button" class="device-btn active" data-device="pc">PC</button>
            <button type="button" class="device-btn" data-device="mobile">スマホ</button>
          </div>
          <a id="preview-modal-open" class="preview-modal-open" target="_blank" rel="noopener noreferrer">新しいタブで開く ↗</a>
          <button type="button" class="preview-modal-close" data-close aria-label="閉じる">×</button>
        </div>
        <div class="preview-modal-body">
          <div id="device-frame" class="device-frame" data-device="pc">
            <iframe id="preview-iframe" class="preview-iframe" title="LPプレビュー" loading="lazy"></iframe>
          </div>
        </div>
      </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
