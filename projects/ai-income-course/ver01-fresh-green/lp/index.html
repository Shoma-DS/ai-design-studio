  <script>
    (() => {
      const lazyMedia = Array.from(document.querySelectorAll("img[data-src], video[data-src]"))
        .filter((element) => !element.closest("template"));
      if (!lazyMedia.length) return;

      const stack = document.querySelector(".lp-stack");
      const directStackChild = (element) => {
        if (!stack) return null;
        let node = element;
        while (node && node.parentElement !== stack) node = node.parentElement;
        return node?.parentElement === stack ? node : null;
      };

      const syncImageLayoutMetrics = () => {
        const stackWidth = stack?.getBoundingClientRect().width || Math.min(window.innerWidth || 430, 430);
        document.querySelectorAll("img[width][height]").forEach((image) => {
          const width = Number(image.getAttribute("width"));
          const height = Number(image.getAttribute("height"));
          if (!Number.isFinite(width) || !Number.isFinite(height) || width <= 0 || height <= 0) return;
          image.style.setProperty("--lp-image-aspect", `${width} / ${height}`);

          const directChild = directStackChild(image);
          if (!directChild) return;
          const drivesDirectChild =
            directChild === image ||
            (directChild.classList.contains("cta-shine-section") && image.classList.contains("lp-section-image")) ||
            (directChild.classList.contains("ai-loop-section") && image.classList.contains("loop-bg-image"));
          if (!drivesDirectChild) return;
          directChild.style.setProperty("--lp-contain-intrinsic-height", `${Math.round((stackWidth * height) / width)}px`);
        });
      };

      syncImageLayoutMetrics();

      const notifyMediaChange = () => {
        window.dispatchEvent(new CustomEvent("lp:media-layout-change"));
      };

      let metricsFrame = 0;
      const scheduleImageLayoutMetrics = () => {
        if (metricsFrame) return;
        metricsFrame = window.requestAnimationFrame(() => {
          metricsFrame = 0;
          syncImageLayoutMetrics();
          notifyMediaChange();
        });
      };

      window.addEventListener("resize", scheduleImageLayoutMetrics, { passive: true });

      const hydrate = (element) => {
        const src = element.getAttribute("data-src");
        if (!src) return;
        element.removeAttribute("data-src");
        if (element.tagName === "IMG") {
          element.addEventListener("load", notifyMediaChange, { once: true });
        }
        element.setAttribute("src", src);
        notifyMediaChange();
        if (element.tagName === "VIDEO") {
          element.load();
          if (element.autoplay) element.play().catch(() => {});
        }
      };

      const hydrateGroup = (target) => {
        if (target.matches?.("img[data-src], video[data-src]")) hydrate(target);
        target.querySelectorAll?.("img[data-src], video[data-src]").forEach((element) => {
          if (element.closest("template")) return;
          hydrate(element);
        });
      };

      if (!("IntersectionObserver" in window)) {
        lazyMedia.forEach(hydrate);
        return;
      }

      const roots = new Set();
      for (const element of lazyMedia) {
        roots.add(element.closest(".testimonial-sync-group, .ai-loop-section, .cta-shine-section") ?? element);
      }

      const observer = new IntersectionObserver((entries) => {
        for (const entry of entries) {
          if (!entry.isIntersecting) continue;
          hydrateGroup(entry.target);
          observer.unobserve(entry.target);
        }
      }, { rootMargin: "700px 0px" });

      roots.forEach((root) => observer.observe(root));
    })();

    (() => {
      const sections = document.querySelectorAll(".ai-loop-section");
      if (!sections.length) return;

      const states = [];
      const stateByTrack = new WeakMap();
      const reduceMotion = window.matchMedia?.("(prefers-reduced-motion: reduce)");
      const mod = (value, length) => ((value % length) + length) % length;
      const toNumber = (value) => {
        const number = Number.parseFloat(value);
        return Number.isFinite(number) ? number : 0;
      };
      const secondsFromStyle = (value) => {
        const source = String(value || "").trim();
        if (!source || source === "none") return 48;
        if (source.endsWith("ms")) return Math.max(0.001, toNumber(source) / 1000);
        return Math.max(0.001, toNumber(source));
      };

      const sourceItems = (track) => {
        const template = track.querySelector(".loop-track-source");
        if (!template) return [];
        return Array.from(template.content.querySelectorAll("img"))
          .map((img) => ({
            src: img.getAttribute("data-src") || img.getAttribute("src"),
            width: Number(img.getAttribute("width")) || 0,
            height: Number(img.getAttribute("height")) || 0
          }))
          .filter((item) => item.src);
      };

      const estimateSize = (state, source, index) => {
        const ratio = source.width && source.height ? source.width / source.height : 1.58;
        if (state.track.classList.contains("loop-track--wide") || source.src.includes("/web-wide/") || source.src.includes("/youtube/") || source.src.includes("/slides/")) {
          return { width: 232, height: 130 };
        }
        if (state.track.classList.contains("loop-track--web-mixed")) {
          const height = 148;
          return { width: Math.max(160, Math.round(ratio * height)), height };
        }
        if (state.track.classList.contains("loop-track--sns-social")) {
          const height = 176;
          return { width: Math.max(112, Math.round(ratio * height)), height };
        }
        if (state.track.classList.contains("loop-track--portrait")) {
          const height = 176;
          return { width: Math.max(108, Math.round(ratio * height)), height };
        }
        if (state.track.classList.contains("loop-track--mixed")) {
          const heights = [152, 118, 166, 132];
          const height = heights[index % heights.length];
          return { width: Math.max(126, Math.round(ratio * height)), height };
        }
        return { width: 156, height: 156 };
      };

      const configureTrackBounds = (state) => {
        const maxHeight = state.sources.reduce((height, source, index) => {
          return Math.max(height, estimateSize(state, source, index).height);
        }, 0);
        const verticalSafety = state.track.classList.contains("loop-track--wide") ? 34 : 44;
        const trackHeight = Math.ceil(maxHeight + verticalSafety);
        state.track.style.setProperty("--loop-track-height", `${trackHeight}px`);
        state.marquee?.style.setProperty("--loop-marquee-height", `${trackHeight}px`);
      };

      const setItemX = (item) => {
        item.img.style.setProperty("--loop-item-x", `${Math.round(item.x)}px`);
      };

      const createImage = (state, sourceIndex) => {
        const source = state.sources[sourceIndex];
        const img = document.createElement("img");
        img.src = source.src;
        img.alt = "";
        img.loading = "eager";
        img.decoding = "async";
        img.fetchPriority = "low";
        if (source.width) img.width = source.width;
        if (source.height) img.height = source.height;
        img.classList.add(`loop-item-pattern-${sourceIndex % 4}`);
        if (source.src.includes("/web-wide/") || source.src.includes("/youtube/") || source.src.includes("/slides/")) {
          img.classList.add("loop-item-kind-wide");
        }
        return img;
      };

      const measureItem = (state, img, sourceIndex) => {
        const rect = img.getBoundingClientRect();
        if (rect.width > 0) return rect.width;
        return estimateSize(state, state.sources[sourceIndex], sourceIndex).width;
      };

      const appendItem = (state, sourceIndex, x) => {
        const img = createImage(state, sourceIndex);
        state.track.appendChild(img);
        const item = { img, sourceIndex, x, width: measureItem(state, img, sourceIndex) };
        setItemX(item);
        state.items.push(item);
        return item;
      };

      const prependItem = (state, sourceIndex) => {
        const img = createImage(state, sourceIndex);
        const firstImage = state.items[0]?.img ?? null;
        state.track.insertBefore(img, firstImage);
        const width = measureItem(state, img, sourceIndex);
        const x = (state.items[0]?.x ?? 0) - width - state.gap;
        const item = { img, sourceIndex, x, width };
        setItemX(item);
        state.items.unshift(item);
        return item;
      };

      const removeItem = (state, item) => {
        item.img.remove();
        state.items = state.items.filter((candidate) => candidate !== item);
      };

      const fillForward = (state) => {
        const viewWidth = state.marquee.clientWidth || state.marquee.getBoundingClientRect().width || 430;
        state.buffer = Math.max(360, viewWidth * 0.85);
        let x = state.items.length
          ? state.items[state.items.length - 1].x + state.items[state.items.length - 1].width + state.gap
          : (state.reverse ? -state.buffer : 0);
        while (x < viewWidth + state.buffer && state.sources.length) {
          const item = appendItem(state, state.nextIndex, x);
          state.nextIndex = mod(state.nextIndex + 1, state.sources.length);
          x += item.width + state.gap;
          if (state.items.length > 18) break;
        }
      };

      const resetTrack = (state) => {
        for (const item of state.items) item.img.remove();
        state.items = [];
        state.nextIndex = 0;
        state.prevIndex = state.sources.length - 1;
        fillForward(state);
      };

      const clearTrack = (state) => {
        for (const item of state.items) item.img.remove();
        state.items = [];
        state.nextIndex = 0;
        state.prevIndex = state.sources.length - 1;
      };

      const initTrack = (track) => {
        if (stateByTrack.has(track)) return stateByTrack.get(track);
        const sources = sourceItems(track);
        if (!sources.length) return null;
        const computed = window.getComputedStyle(track);
        const gap = toNumber(computed.columnGap || computed.gap) || 12;
        const duration = secondsFromStyle(track.style.animationDuration || computed.animationDuration);
        const reverse = (track.style.animationDirection || computed.animationDirection) === "reverse";
        const state = {
          track,
          marquee: track.closest(".loop-marquee"),
          sources,
          items: [],
          nextIndex: 0,
          prevIndex: sources.length - 1,
          gap,
          duration,
          reverse,
          speed: 30,
          buffer: 360,
          active: false,
          frame: 0,
          lastTime: 0
        };
        configureTrackBounds(state);
        const cycleWidth = sources.reduce((sum, source, index) => sum + estimateSize(state, source, index).width + gap, 0);
        state.speed = Math.min(90, Math.max(22, cycleWidth / duration));
        track.classList.add("is-virtualized");
        resetTrack(state);
        stateByTrack.set(track, state);
        states.push(state);
        return state;
      };

      const step = (state, now) => {
        if (!state.active) return;
        if (!state.lastTime) state.lastTime = now;
        const delta = Math.min(64, now - state.lastTime) / 1000;
        state.lastTime = now;

        if (!state.marquee.classList.contains("is-user-paused") && !reduceMotion?.matches) {
          const viewWidth = state.marquee.clientWidth || 430;
          const distance = state.speed * delta;
          for (const item of state.items) {
            item.x += state.reverse ? distance : -distance;
            setItemX(item);
          }

          if (state.reverse) {
            while (state.items.length && state.items[state.items.length - 1].x > viewWidth + state.buffer) {
              removeItem(state, state.items[state.items.length - 1]);
            }
            while (state.items.length && state.items[0].x > -state.buffer) {
              prependItem(state, state.prevIndex);
              state.prevIndex = mod(state.prevIndex - 1, state.sources.length);
              if (state.items.length > 18) break;
            }
          } else {
            while (state.items.length && state.items[0].x + state.items[0].width < -state.buffer) {
              removeItem(state, state.items[0]);
            }
          }
          fillForward(state);
        }

        state.frame = window.requestAnimationFrame((time) => step(state, time));
      };

      const startTrack = (state) => {
        if (!state || state.active) return;
        if (!state.items.length) resetTrack(state);
        state.active = true;
        state.lastTime = 0;
        if (!state.frame) {
          state.frame = window.requestAnimationFrame((time) => step(state, time));
        }
      };

      const stopTrack = (state) => {
        if (!state) return;
        state.active = false;
        if (state.frame) {
          window.cancelAnimationFrame(state.frame);
          state.frame = 0;
        }
        clearTrack(state);
      };

      const isNearViewport = (section) => {
        const rect = section.getBoundingClientRect();
        const margin = 420;
        return rect.top < window.innerHeight + margin && rect.bottom > -margin;
      };

      const setActive = (section, active) => {
        const shouldRun = active && isNearViewport(section);
        section.classList.toggle("is-loop-active", shouldRun);
        const tracks = Array.from(section.querySelectorAll(".loop-track--virtual"));
        for (const track of tracks) {
          if (shouldRun) {
            startTrack(initTrack(track));
          } else {
            stopTrack(stateByTrack.get(track));
          }
        }
      };

      let resizeTimer = 0;
      window.addEventListener("resize", () => {
        window.clearTimeout(resizeTimer);
        resizeTimer = window.setTimeout(() => {
          for (const state of states) resetTrack(state);
        }, 160);
      }, { passive: true });

      if (!("IntersectionObserver" in window)) {
        sections.forEach((section) => setActive(section, true));
        return;
      }

      const observer = new IntersectionObserver((entries) => {
        for (const entry of entries) {
          setActive(entry.target, entry.isIntersecting);
        }
      }, { rootMargin: "180px 0px" });

      sections.forEach((section) => observer.observe(section));
    })();

    (() => {
      const marquees = document.querySelectorAll(".loop-marquee");
      if (!marquees.length || !window.matchMedia) return;

      const coarsePointer = window.matchMedia("(pointer: coarse)");
      const canInteract = () => coarsePointer.matches;

      marquees.forEach((marquee) => {
        let startX = 0;
        let startY = 0;
        let moved = false;
        let wasPaused = false;

        marquee.addEventListener("pointerdown", (event) => {
          if (!canInteract()) return;
          startX = event.clientX;
          startY = event.clientY;
          moved = false;
          wasPaused = marquee.classList.contains("is-user-paused");
          marquee.classList.add("is-user-paused");
        }, { passive: true });

        marquee.addEventListener("pointermove", (event) => {
          if (!canInteract()) return;
          const dx = Math.abs(event.clientX - startX);
          const dy = Math.abs(event.clientY - startY);
          if (dx > 8 || dy > 8) moved = true;
        }, { passive: true });

        marquee.addEventListener("click", () => {
          if (!canInteract()) return;
          if (moved) {
            moved = false;
            return;
          }
          marquee.classList.toggle("is-user-paused", !wasPaused);
        });

        marquee.addEventListener("keydown", (event) => {
          if (event.key !== "Enter" && event.key !== " ") return;
          event.preventDefault();
          marquee.classList.toggle("is-user-paused");
        });
      });
    })();

    (() => {
      const root = document.querySelector("[data-testimonial-carousel]");
      if (!root) return;

      const groups = Array.from(root.querySelectorAll("[data-testimonial-slides]"));
      const primarySlides = Array.from(groups[0]?.querySelectorAll(".testimonial-slide") ?? []);
      const dots = Array.from(root.querySelectorAll(".testimonial-dot"));
      const prev = root.querySelector(".testimonial-nav--prev");
      const next = root.querySelector(".testimonial-nav--next");
      if (!groups.length || !primarySlides.length || !prev || !next) return;
      const storySection = root.querySelector(".testimonial-carousel-section--story");
      const voiceSection = root.querySelector(".testimonial-carousel-section--voice");
      const photoPeekPrev = root.querySelector(".testimonial-photo-peek--prev");
      const photoPeekNext = root.querySelector(".testimonial-photo-peek--next");
      const photoPeeks = [
        { control: photoPeekPrev, img: photoPeekPrev?.querySelector("img") },
        { control: photoPeekNext, img: photoPeekNext?.querySelector("img") }
      ];
      const people = primarySlides.map((slide) => {
        const photo = slide.querySelector(".testimonial-photo-overlay");
        return {
          id: slide.dataset.testimonialSlide || "",
          photoSrc: photo?.dataset.src || photo?.getAttribute("src") || "",
          photoAlt: photo?.getAttribute("alt") || ""
        };
      });

      const defaultNav = {
        center: { prevX: 58, prevYOffset: 0, nextX: 58, nextYOffset: 0 },
        story: { prevX: 3, prevYOffset: 0, nextX: 8, nextYOffset: 0 },
        voice: { prevX: 10, prevYOffset: 0, nextX: 10, nextYOffset: 0 }
      };

      const navGroup = (source, fallback) => ({
        prevX: Number(source?.prevX ?? fallback.prevX),
        prevYOffset: Number(source?.prevYOffset ?? fallback.prevYOffset ?? 0),
        nextX: Number(source?.nextX ?? fallback.nextX),
        nextYOffset: Number(source?.nextYOffset ?? fallback.nextYOffset ?? 0)
      });

      const navSettings = (source) => {
        const legacyStory = source?.prevX !== undefined || source?.nextX !== undefined || source?.prevYOffset !== undefined || source?.nextYOffset !== undefined;
        return {
          center: navGroup(source?.center, defaultNav.center),
          story: navGroup(legacyStory ? source : source?.story, defaultNav.story),
          voice: navGroup(source?.voice, defaultNav.voice)
        };
      };

      const applyNavGroup = (target, prefix, group) => {
        if (!target || !group) return;
        target.style.setProperty(`--${prefix}-nav-prev-x`, `${group.prevX}px`);
        target.style.setProperty(`--${prefix}-nav-prev-y-offset`, `${group.prevYOffset}%`);
        target.style.setProperty(`--${prefix}-nav-next-x`, `${group.nextX}px`);
        target.style.setProperty(`--${prefix}-nav-next-y-offset`, `${group.nextYOffset}%`);
      };

      fetch("testimonial-photo-settings.json", { cache: "no-store" })
        .then((response) => (response.ok ? response.json() : null))
        .then((settings) => {
          if (!settings) return;
          if (settings.slides) {
            root.querySelectorAll(".testimonial-slide").forEach((slide) => {
              const id = slide.dataset.testimonialSlide;
              const y = Number(settings.slides[id]?.photoYPercent ?? 0);
              if (Number.isFinite(y)) {

              if (Number.isFinite(iconX)) {
                slide.style.setProperty("--testimonial-voice-icon-x", `${iconX}%`);
              }
              const iconY = Number(settings.slides[id]?.voiceIconYPercent ?? 0);
              if (Number.isFinite(iconY)) {
                slide.style.setProperty("--testimonial-voice-icon-y", `${iconY}%`);
              }
            });
          }
          if (settings.storyNav) {
            const nav = navSettings(settings.storyNav);
            applyNavGroup(root, "center", nav.center);
            applyNavGroup(storySection, "story", nav.story);
            applyNavGroup(voiceSection, "voice", nav.voice);
          }
          syncPeekTop();
          syncStoryNavTop();
        })
        .catch(() => {});

      let current = 0;
      let isDragging = false;
      let dragStartX = 0;
      let dragStartY = 0;
      let dragDirectionKnown = false;
      let isHorizontalDrag = false;
      const DRAG_THRESHOLD = 60;

      const syncPeekTop = () => {
        const activeSlide = Array.from(groups[0]?.querySelectorAll(".testimonial-slide") ?? [])[current];
        if (activeSlide) {
          root.style.setProperty("--peek-photo-top", activeSlide.style.getPropertyValue("--testimonial-photo-y") || "0%");
        }
      };

      const setPhotoPeek = (target, person) => {
        if (!target?.img || !person?.photoSrc) return;
        target.img.src = person.photoSrc;
        target.img.dataset.src = person.photoSrc;
        target.img.alt = person.photoAlt;
      };

      const syncPhotoPeeks = () => {
        if (!people.length) return;
        const prevIndex = (current - 1 + people.length) % people.length;
        const nextIndex = (current + 1) % people.length;
        setPhotoPeek(photoPeeks[0], people[prevIndex]);
        setPhotoPeek(photoPeeks[1], people[nextIndex]);
      };

      const syncStoryNavTop = () => {
        if (!storySection) return;
        storySection.style.setProperty("--story-nav-top", "45.8%");
      };

      const show = (index) => {
        current = (index + primarySlides.length) % primarySlides.length;
        const prevIndex = (current - 1 + primarySlides.length) % primarySlides.length;
        const nextIndex = (current + 1) % primarySlides.length;

        groups.forEach((group) => {
          Array.from(group.querySelectorAll(".testimonial-slide")).forEach((slide, slideIndex) => {
            const active = slideIndex === current;
            const prev = !active && slideIndex === prevIndex;
            const next = !active && slideIndex === nextIndex;
            slide.classList.toggle("is-active", active);
            slide.classList.toggle("is-prev", prev);
            slide.classList.toggle("is-next", next);
            slide.setAttribute("aria-hidden", active ? "false" : "true");
          });
        });

        dots.forEach((dot, dotIndex) => {
          const active = dotIndex === current;
          dot.classList.toggle("is-active", active);
          dot.setAttribute("aria-current", active ? "true" : "false");
        });

        syncPeekTop();
        syncPhotoPeeks();
        setTimeout(syncStoryNavTop, 50);
      };

      prev.addEventListener("click", () => show(current - 1));
      next.addEventListener("click", () => show(current + 1));

      photoPeekPrev?.addEventListener("click", () => show(current - 1));
      photoPeekNext?.addEventListener("click", () => show(current + 1));

      window.addEventListener("resize", syncStoryNavTop, { passive: true });
      window.addEventListener("load", syncStoryNavTop, { once: true });

      if (storySection && "IntersectionObserver" in window) {
        new IntersectionObserver((entries) => {
          for (const entry of entries) {
            if (entry.isIntersecting) syncStoryNavTop();
          }
        }, { threshold: 0.22 }).observe(storySection);
        new IntersectionObserver((entries) => {
          for (const entry of entries) {
            root.classList.toggle("is-hint-active", entry.isIntersecting);
          }
        }, { threshold: 0.02 }).observe(root);
      } else {
        root.classList.add("is-hint-active");
      }

      root.querySelectorAll(".testimonial-photo-overlay").forEach((img) => {
        img.addEventListener("load", syncStoryNavTop, { once: true });
      });

      dots.forEach((dot, index) => {
        dot.addEventListener("click", () => show(index));
      });

      root.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft") {
          event.preventDefault();
          show(current - 1);
        }
        if (event.key === "ArrowRight") {
          event.preventDefault();
          show(current + 1);
        }
      });

      root.addEventListener("pointerdown", (event) => {
        if (event.target.closest(".testimonial-nav, .testimonial-dot, .testimonial-photo-peek")) return;
        dragStartX = event.clientX;
        dragStartY = event.clientY;
        isDragging = true;
        dragDirectionKnown = false;
        isHorizontalDrag = false;
      }, { passive: true });

      root.addEventListener("pointermove", (event) => {
        if (!isDragging) return;
        const dx = event.clientX - dragStartX;
        const dy = event.clientY - dragStartY;
        if (!dragDirectionKnown) {
          if (Math.abs(dx) < 5 && Math.abs(dy) < 5) return;
          dragDirectionKnown = true;
          isHorizontalDrag = Math.abs(dx) > Math.abs(dy);
          if (isHorizontalDrag) {
            root.classList.add("is-dragging");
            try { root.setPointerCapture(event.pointerId); } catch (_) {}
          }
        }
        if (!isHorizontalDrag) return;
        event.preventDefault();
        root.style.setProperty("--face-drag", `${dx}px`);
      }, { passive: false });

      const finishDrag = (clientX) => {
        if (!isDragging) return;
        isDragging = false;
        if (!isHorizontalDrag) return;
        root.classList.remove("is-dragging");
        const dx = clientX - dragStartX;
        if (Math.abs(dx) >= DRAG_THRESHOLD) show(dx > 0 ? current - 1 : current + 1);
        root.style.setProperty("--face-drag", "0px");
      };

      root.addEventListener("pointerup", (event) => finishDrag(event.clientX), { passive: true });
      root.addEventListener("pointercancel", () => {
        if (!isDragging) return;
        isDragging = false;
        if (isHorizontalDrag) {
          root.classList.remove("is-dragging");
          root.style.setProperty("--face-drag", "0px");
        }
      }, { passive: true });

      show(0);
    })();

    (() => {
      const layer = document.getElementById("lp-link-layer");
      if (!layer) return;

      let cachedAreas = [];
      let resizeTimer = 0;
      let viewportFrame = 0;
      let resizeObserver = null;

      const areaRect = (area) => {
        const local = area && typeof area.local === "object" ? area.local : area;
        if (!local) return null;
        const x = Number(local.x);
        const y = Number(local.y);
        const width = Number(local.width);
        const height = Number(local.height);
        if (![x, y, width, height].every(Number.isFinite) || width <= 0 || height <= 0) return null;
        return { x, y, width, height };
      };

      const assetKey = (value) => {
        const source = String(value || "").split(/[?#]/)[0].split("/").pop() || "";
        return source.replace(/\.[^.]+$/, "").toLowerCase();
      };

      const imageTargets = () => {
        const targets = new Map();
        document.querySelectorAll(".lp-section-image, .loop-bg-image").forEach((image) => {
          const key = assetKey(image.getAttribute("src"));
          if (key && !targets.has(key)) targets.set(key, image);
        });
        return targets;
      };

      const resolveTarget = (area, targets) => {
        const bySection = area.sectionId
          ? document.querySelector(`[data-link-target="${area.sectionId}"]`)
          : null;
        if (bySection) return bySection;
        const key = assetKey(area.imageName);
        return key ? targets.get(key) : null;
      };

      const toLayerRect = (target, rect) => {
        const layerRect = layer.getBoundingClientRect();
        if (!layerRect.width || !layerRect.height) return rect;
        if (!target) return rect;
        const targetRect = target.getBoundingClientRect();
        return {
          x: ((targetRect.left - layerRect.left + (rect.x / 100) * targetRect.width) / layerRect.width) * 100,
          y: ((targetRect.top - layerRect.top + (rect.y / 100) * targetRect.height) / layerRect.height) * 100,
          width: ((rect.width / 100) * targetRect.width / layerRect.width) * 100,
          height: ((rect.height / 100) * targetRect.height / layerRect.height) * 100
        };
      };

      const bounded = (value, min, max, fallback) => {
        const number = Number(value);
        const source = Number.isFinite(number) ? number : fallback;
        return Math.max(min, Math.min(max, source));
      };

      const applyRect = (element, rect) => {
        element.style.left = `${rect.x}%`;
        element.style.top = `${rect.y}%`;
        element.style.width = `${rect.width}%`;
        element.style.height = `${rect.height}%`;
      };

      const applyRadius = (element, radius) => {
        const value = bounded(radius, 0, 50, 8);
        element.style.borderRadius = `${value}%`;
        element.style.clipPath = `inset(0 round ${value}%)`;
      };

      const applyShineSettings = (element, area) => {
        const radius = bounded(area.shineRadius, 0, 50, 50);
        applyRadius(element, radius);
        element.style.setProperty("--cta-shine-angle", `${bounded(area.shineAngle, 70, 130, 105)}deg`);
        element.style.setProperty("--cta-shine-skew", `${bounded(area.shineAngle, 70, 130, 105) - 123}deg`);
        element.style.setProperty("--cta-shine-width", `${bounded(area.shineWidth, 8, 50, 28)}%`);
        element.style.setProperty("--cta-shine-duration", `${bounded(area.shineDuration, 1.2, 6, 3.6)}s`);
        element.style.setProperty("--cta-shine-opacity", `${bounded(area.shineOpacity, 10, 100, 88) / 100}`);
      };

      const ctaFingerSections = new Set(["SEC-01", "HTML-route-choice-cta", "SEC-14"]);
      const ctaFingerPlacement = {
        "SEC-14": { xRatio: 0.78, yRatio: 0.42, allowBottomOverflow: true }
      };

      const addCtaFinger = (rect, area) => {
        if (!ctaFingerSections.has(area.sectionId)) return;
        const placement = ctaFingerPlacement[area.sectionId] || {};
        const xRatio = typeof placement.xRatio === "number" ? placement.xRatio : 0.82;
        const yRatio = typeof placement.yRatio === "number" ? placement.yRatio : 0.42;
        const layerRect = layer.getBoundingClientRect();
        const fingerWidth = Math.max(21, Math.min(30, rect.width * 0.32));
        const fingerHeight = layerRect.width && layerRect.height
          ? ((fingerWidth / 100) * layerRect.width / layerRect.height) * 100
          : 0;
        const fingerTopTarget = rect.y + rect.height * yRatio;
        const fingerTop = placement.allowBottomOverflow
          ? fingerTopTarget
          : Math.min(fingerTopTarget, Math.max(0, 100 - fingerHeight - 0.16));
        const finger = document.createElement("img");
        finger.className = `lp-cta-click-finger lp-cta-click-finger--${String(area.sectionId).replace(/[^a-z0-9_-]/gi, "-").toLowerCase()}`;
        finger.src = "assets/testimonials/click-finger.png";
        finger.alt = "";
        finger.setAttribute("aria-hidden", "true");
        finger.width = 512;
        finger.height = 512;
        finger.decoding = "async";
        finger.loading = area.sectionId === "SEC-01" ? "eager" : "lazy";
        finger.style.left = `${rect.x + rect.width * xRatio}%`;
        finger.style.top = `${fingerTop}%`;
        finger.style.width = `${fingerWidth}%`;
        layer.appendChild(finger);
      };

      const renderAreas = () => {
        const targets = imageTargets();
        layer.replaceChildren();

        for (const area of cachedAreas) {
          const target = resolveTarget(area, targets);
          const linkRect = areaRect(target && area.local ? area.local : area);
          if (!linkRect) continue;
          const resolvedLinkRect = toLayerRect(target, linkRect);

          if (area.url || area.cta === true) {
            const link = document.createElement("a");
            link.href = area.url || "#";
            link.setAttribute("aria-label", area.label || "リンクを開く");
            applyRect(link, resolvedLinkRect);
            if (area.cta === true) {
              link.className = "lp-cta-button lp-link-cta-button";
              link.innerHTML = `<span class="lp-cta-button__label"></span><span class="lp-cta-button__icon" aria-hidden="true"></span>`;
              link.querySelector(".lp-cta-button__label").textContent = area.ctaCopy || area.label || "60分の無料講座に申し込む";
            } else {
              applyRadius(link, area.radius);
            }
            layer.appendChild(link);
            addCtaFinger(resolvedLinkRect, area);
          }

          if (area.shine === true && area.cta !== true && target) {
            const shineLocalRect = area.shineRect
              ? areaRect(area.shineRect)
              : (area.local ? areaRect(area.local) : areaRect(area));
            if (shineLocalRect) {
              const shine = document.createElement("span");
              shine.className = "cta-shine";
              shine.setAttribute("aria-hidden", "true");
              applyRect(shine, toLayerRect(target, shineLocalRect));
              applyShineSettings(shine, area);
              layer.appendChild(shine);
            }
          }
        }
      };

      const scheduleRender = () => {
        window.clearTimeout(resizeTimer);
        resizeTimer = window.setTimeout(renderAreas, 80);
      };

      const scheduleViewportRender = () => {
        if (viewportFrame) return;
        viewportFrame = window.requestAnimationFrame(() => {
          viewportFrame = 0;
          renderAreas();
        });
      };

      const observeLayoutTargets = () => {
        if (!("ResizeObserver" in window)) return;
        if (resizeObserver) resizeObserver.disconnect();
        resizeObserver = new ResizeObserver(scheduleRender);
        if (layer.parentElement) resizeObserver.observe(layer.parentElement);
        document.querySelectorAll("[data-link-target], .lp-section-image, .loop-bg-image").forEach((element) => {
          resizeObserver.observe(element);
        });
      };

      fetch("link-areas.json")
        .then((response) => response.ok ? response.json() : { areas: [] })
        .then((data) => {
          cachedAreas = Array.isArray(data.areas) ? data.areas : [];
          observeLayoutTargets();
          renderAreas();
        })
        .catch(() => {});

      window.addEventListener("resize", scheduleRender, { passive: true });
      window.addEventListener("scroll", scheduleViewportRender, { passive: true });
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", scheduleRender, { passive: true });
        window.visualViewport.addEventListener("scroll", scheduleViewportRender, { passive: true });
      }
      window.addEventListener("lp:media-layout-change", scheduleRender, { passive: true });
      window.addEventListener("load", () => {
        observeLayoutTargets();
        renderAreas();
      }, { once: true });
    })();

    (() => {
      const section = document.querySelector(".ai-video-section");
      if (!section) return;
      const videos = Array.from(section.querySelectorAll("video"));
      if (!videos.length) return;
      const activate = () => videos.forEach(v => { v.load(); v.play().catch(() => {}); });
      const deactivate = () => videos.forEach(v => v.pause());
      if (!("IntersectionObserver" in window)) { activate(); return; }
      const obs = new IntersectionObserver(entries => {
        for (const entry of entries) entry.isIntersecting ? activate() : deactivate();
      }, { rootMargin: "240px 0px" });
      obs.observe(section);
    })();
  </script>
</body>
</html>
