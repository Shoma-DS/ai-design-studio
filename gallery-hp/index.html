<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HP Portfolio Gallery</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>HP Portfolio Gallery</h1>
      <p class="page-subtitle">制作したコーポレートサイト（HP）を検索・カテゴリ・タグで一覧できるポートフォリオです。</p>
    </header>

    <main>
      <div class="controls">
        <input
          id="search-input"
          type="search"
          placeholder="タイトル・見出し・タグで検索"
          aria-label="HPを検索"
        />
        <div class="filter-dropdown">
          <div class="filter-trigger-row">
            <button type="button" class="filter-trigger" data-facet="mood">
              雰囲気で探す
              <span id="mood-active-count" class="filter-count-badge" hidden>0</span>
              <span class="filter-trigger-chevron" aria-hidden="true">▾</span>
            </button>
            <button type="button" class="filter-trigger" data-facet="product">
              商品で探す
              <span id="product-active-count" class="filter-count-badge" hidden>0</span>
              <span class="filter-trigger-chevron" aria-hidden="true">▾</span>
            </button>
            <button type="button" class="filter-trigger" data-facet="feature">
              機能で探す
              <span id="feature-active-count" class="filter-count-badge" hidden>0</span>
              <span class="filter-trigger-chevron" aria-hidden="true">▾</span>
            </button>
          </div>

          <div id="filter-panel" class="filter-panel" hidden>
            <div class="filter-panel-body">
              <div id="filter-panel-options" class="mid-category-list"></div>
            </div>
            <div class="filter-panel-footer">
              <button type="button" id="filter-clear-btn" class="filter-clear-btn">すべてクリア</button>
              <button type="button" id="filter-apply-btn" class="filter-apply-btn">
                絞り込む（<span id="filter-preview-count">0</span>件）
              </button>
            </div>
          </div>
        </div>
      </div>

      <p id="result-count" class="result-count"></p>

      <div id="card-grid" class="card-grid"></div>
      <p id="empty-state" class="empty-state" hidden>該当するHPが見つかりませんでした。</p>
    </main>

    <div id="preview-modal" class="preview-modal" hidden>
      <div class="preview-modal-backdrop" data-close></div>
      <div class="preview-modal-panel" role="dialog" aria-modal="true" aria-labelledby="preview-modal-title">
        <div class="preview-modal-header">
          <p id="preview-modal-title" class="preview-modal-title"></p>
          <div class="device-toggle" role="group" aria-label="PC/スマホ表示切り替え">
            <button type="button" class="device-btn active" data-device="pc">PC</button>
            <button type="button" class="device-btn" data-device="mobile">スマホ</button>
          </div>
          <a id="preview-modal-open" class="preview-modal-open" target="_blank" rel="noopener noreferrer">新しいタブで開く ↗</a>
          <button type="button" class="preview-modal-close" data-close aria-label="閉じる">×</button>
        </div>
        <div class="preview-modal-body">
          <div id="device-frame" class="device-frame" data-device="pc">
            <iframe id="preview-iframe" class="preview-iframe" title="HPプレビュー" loading="lazy"></iframe>
          </div>
        </div>
      </div>
    </div>

    <script src="data.js"></script>
    <script>
      (async () => {
        try {
          const res = await fetch("/api/websites");
          if (res.ok) {
            const rows = await res.json();
            if (Array.isArray(rows) && rows.length) window.HP_GALLERY_DATA = rows;
          }
        } catch (error) {
          console.warn("DBからの取得に失敗したため、data.jsのフォールバックを使用します。", error);
        }
        const script = document.createElement("script");
        script.src = "script.js";
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
