<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BEAUTE Rêve Cerisier 2026 summer 特別号</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="lp-shell" aria-label="BEAUTE Rêve Cerisier 2026 summer 特別号">
      <img class="lp-full" src="./images/01-cover.jpg" alt="BEAUTE Rêve Cerisier 2026 summer 特別号 間に合う脱毛で夏をもっと快適＆美しく" decoding="async" fetchpriority="high">
      <img class="lp-full" src="./images/02-uvcare.jpg" alt="紫外線に負けない 暑い熱もさわやか笑顔で元気に過ごすために">

      <div class="campaign-wrap">
        <img class="lp-full" src="./images/03-campaign.jpg" alt="間に合う脱毛キャンペーン 8月末まで有効 両脇5回＋VIO1回 7,700円（税込）">
        <a class="coupon-pop" href="https://iomnuv9k.autosns.app/tk/QjmqslzFNt?uid=[[uid]]" target="_blank" rel="noopener" aria-label="クーポンを受け取る">
          <img class="coupon-pop-img" src="./images/coupon-banner.jpg" alt="">
        </a>
      </div>

      <div class="reserve-wrap reserve-datsumo">
        <a class="reserve-button" href="https://iomnuv9k.autosns.app/cl/G6zU3Wh8SB?uid=[[uid]]" target="_blank" rel="noopener" aria-label="脱毛を予約する">
          <img class="reserve-img" src="./images/reserve-datsumo.jpg" alt="">
        </a>
      </div>

      <img class="lp-full" src="./images/04-korugi-intro.jpg" alt="夏こそ、コルギ。むくみ・たるみをケアするアプローチで、すっきり小顔＆美背中に">
      <img class="lp-full" src="./images/05-korugi-effect.jpg" alt="コルギの効果 小顔への効果・美背中への効果">

      <div class="reserve-wrap reserve-korugi">
        <a class="reserve-button" href="https://iomnuv9k.autosns.app/cl/fYRO1BFwqT?uid=[[uid]]" target="_blank" rel="noopener" aria-label="コルギを予約する">
          <img class="reserve-img" src="./images/reserve-korugi.jpg" alt="">
        </a>
      </div>

      <img class="lp-full" src="./images/06-skincare-damage.jpg" alt="夏のダメージを受けた肌を、いたわり・満たす・守る 本気のスキンケアを">
      <img class="lp-full" src="./images/07-products.jpg" alt="夏におすすめする商品のご紹介">
    </main>
  </body>
</html>
