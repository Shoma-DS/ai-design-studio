<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VERDIA エイジングケアヘアラインLP</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="lp-shell" aria-label="VERDIA エイジングケアヘアラインLP">
      <picture class="lp-section lp-section-hero">
        <source media="(max-width: 767px)" srcset="./images/mobile/01-hero.png">
        <img class="lp-section-img img-ratio-hero" src="./images/01-hero.png" alt="VERDIA エイジングケアヘアラインLP" decoding="async" fetchpriority="high">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/02-intro-mood.png">
        <img class="lp-section-img img-ratio-intro-mood" src="./images/02-intro-mood.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/03-problem.png">
        <img class="lp-section-img img-ratio-problem" src="./images/03-problem.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/04-tech-overview.png">
        <img class="lp-section-img img-ratio-tech-overview" src="./images/04-tech-overview.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/05-tech-detail.png">
        <img class="lp-section-img img-ratio-tech-detail" src="./images/05-tech-detail.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/06-product1-grandsilk.png">
        <img class="lp-section-img img-ratio-product1-grandsilk" src="./images/06-product1-grandsilk.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/07-product2-grandsatin.png">
        <img class="lp-section-img img-ratio-product2-grandsatin" src="./images/07-product2-grandsatin.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/08-product3-reviveessence.png">
        <img class="lp-section-img img-ratio-product3-reviveessence" src="./images/08-product3-reviveessence.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/09-product4-aquaspa.png">
        <img class="lp-section-img img-ratio-product4-aquaspa" src="./images/09-product4-aquaspa.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/10-system-table.png">
        <img class="lp-section-img img-ratio-system-table" src="./images/10-system-table.png" alt="" loading="lazy">
      </picture>
    </main>
    <button type="button" class="back-to-top" aria-label="トップへ戻る">↑</button>
    <script src="./script.js"></script>
  </body>
</html>
