<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>薄紅 -usubeni- プレミアムピンク梅酒セットLP</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="lp-shell" aria-label="薄紅 -usubeni- プレミアムピンク梅酒セットLP">
      <picture class="lp-section lp-section-hero">
        <source media="(max-width: 767px)" srcset="./images/mobile/01-hero.png">
        <img class="lp-section-img img-ratio-hero" src="./images/01-hero.png" alt="薄紅 -usubeni- プレミアムピンク梅酒セットLP" decoding="async" fetchpriority="high">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/02-intro-price.png">
        <img class="lp-section-img img-ratio-intro-price" src="./images/02-intro-price.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/03-mood-photo.png">
        <img class="lp-section-img img-ratio-mood-photo" src="./images/03-mood-photo.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/04-gallery-grid.png">
        <img class="lp-section-img img-ratio-gallery-grid" src="./images/04-gallery-grid.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/05-story.png">
        <img class="lp-section-img img-ratio-story" src="./images/05-story.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/06-purchase-method.png">
        <img class="lp-section-img img-ratio-purchase-method" src="./images/06-purchase-method.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/07-maker.png">
        <img class="lp-section-img img-ratio-maker" src="./images/07-maker.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/08-product-detail.png">
        <img class="lp-section-img img-ratio-product-detail" src="./images/08-product-detail.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/09-footer.png">
        <img class="lp-section-img img-ratio-footer" src="./images/09-footer.png" alt="" loading="lazy">
      </picture>
    </main>
    <button type="button" class="back-to-top" aria-label="トップへ戻る">↑</button>
    <script src="./script.js"></script>
  </body>
</html>
