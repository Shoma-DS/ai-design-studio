<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>あしたタウン〜みんなにやさしい17のなかまたち〜 SDGs啓発キャンペーンLP</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="lp-shell" aria-label="あしたタウン〜みんなにやさしい17のなかまたち〜 SDGs啓発キャンペーンLP">
      <picture class="lp-section lp-section-hero">
        <source media="(max-width: 767px)" srcset="./images/mobile/01-header-title.png">
        <img class="lp-section-img img-ratio-header-title" src="./images/01-header-title.png" alt="あしたタウン〜みんなにやさしい17のなかまたち〜 SDGs啓発キャンペーンLP" decoding="async" fetchpriority="high">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/02-earth-illustration.png">
        <img class="lp-section-img img-ratio-earth-illustration" src="./images/02-earth-illustration.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/03-sdgs-catchphrase.png">
        <img class="lp-section-img img-ratio-sdgs-catchphrase" src="./images/03-sdgs-catchphrase.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/04-story-intro-card.png">
        <img class="lp-section-img img-ratio-story-intro-card" src="./images/04-story-intro-card.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/05-story-grid.png">
        <img class="lp-section-img img-ratio-story-grid" src="./images/05-story-grid.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/06-characters-heading.png">
        <img class="lp-section-img img-ratio-characters-heading" src="./images/06-characters-heading.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/07-characters-airship.png">
        <img class="lp-section-img img-ratio-characters-airship" src="./images/07-characters-airship.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/08-sdgs-board.png">
        <img class="lp-section-img img-ratio-sdgs-board" src="./images/08-sdgs-board.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/09-sdgs-gallery-audience.png">
        <img class="lp-section-img img-ratio-sdgs-gallery-audience" src="./images/09-sdgs-gallery-audience.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/10-logo-recap-nav.png">
        <img class="lp-section-img img-ratio-logo-recap-nav" src="./images/10-logo-recap-nav.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/11-footer.png">
        <img class="lp-section-img img-ratio-footer" src="./images/11-footer.png" alt="" loading="lazy">
      </picture>
    </main>
    <button type="button" class="back-to-top" aria-label="トップへ戻る">↑</button>
    <script src="./script.js"></script>
  </body>
</html>
