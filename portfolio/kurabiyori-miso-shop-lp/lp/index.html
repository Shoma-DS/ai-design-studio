<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>蔵日和 特選（KURABIYORI TOKUSEN）味噌オンラインショップLP</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="lp-shell" aria-label="蔵日和 特選（KURABIYORI TOKUSEN）味噌オンラインショップLP">
      <picture class="lp-section lp-section-hero">
        <source media="(max-width: 767px)" srcset="./images/mobile/01-hero.png">
        <img class="lp-section-img" src="./images/01-hero.png" alt="発酵の技を極めし蔵人が生み出す味噌「蔵日和特選」" decoding="async" fetchpriority="high">
        <a href="#notice" class="hero-nav-link hero-nav-link--notice" aria-label="お知らせへ移動">お知らせ</a>
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/02-story.png">
        <img class="lp-section-img" src="./images/02-story.png" alt="蔵日和特選のストーリー" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/03-three-miso.png">
        <img class="lp-section-img" src="./images/03-three-miso.png" alt="3種の味噌" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/04-craftsman.png">
        <img class="lp-section-img" src="./images/04-craftsman.png" alt="蔵人のこだわり" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/05-links-series-heading.png">
        <img class="lp-section-img" src="./images/05-links-series-heading.png" alt="蔵日和特選シリーズ" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/06-series-products.png">
        <img class="lp-section-img" src="./images/06-series-products.png" alt="蔵日和特選シリーズ商品一覧" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/07-partners.png">
        <img class="lp-section-img" src="./images/07-partners.png" alt="取扱店舗・提携先" loading="lazy">
      </picture>
      <picture id="notice" class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/08-footer.png">
        <img class="lp-section-img" src="./images/08-footer.png" alt="お知らせ・フッター" loading="lazy">
      </picture>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
