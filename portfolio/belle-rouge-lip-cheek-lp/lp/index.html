<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BELLE ROUGE 彩香リップ&チーク LP</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="lp-shell" aria-label="BELLE ROUGE 彩香リップ&チーク LP">
      <div class="hero-wrap img-ratio-hero-video">
        <video
          class="hero-video-full"
          src="./videos/hero-fv-animated.mp4"
          poster="./images/hero-fv-animated-poster.jpg"
          autoplay
          muted
          loop
          playsinline
          preload="auto"
        ></video>
      </div>
      <picture class="reveal"><source media="(max-width: 767px)" srcset="./images/mobile/02-hero-closing.jpg"><img class="lp-full img-ratio-hero-closing" src="./images/02-hero-closing.jpg" alt="" loading="lazy" decoding="async"></picture>
      <picture class="reveal"><source media="(max-width: 767px)" srcset="./images/mobile/03-social-proof.jpg"><img class="lp-full img-ratio-social-proof" src="./images/03-social-proof.jpg" alt="" loading="lazy" decoding="async"></picture>
      <picture class="reveal"><source media="(max-width: 767px)" srcset="./images/mobile/04-points-intro.jpg"><img class="lp-full img-ratio-points-intro" src="./images/04-points-intro.jpg" alt="" loading="lazy" decoding="async"></picture>
      <picture class="reveal"><source media="(max-width: 767px)" srcset="./images/mobile/05-point1-natural.jpg"><img class="lp-full img-ratio-point1-natural" src="./images/05-point1-natural.jpg" alt="" loading="lazy" decoding="async"></picture>
      <picture class="reveal"><source media="(max-width: 767px)" srcset="./images/mobile/06-point2-moisture.jpg"><img class="lp-full img-ratio-point2-moisture" src="./images/06-point2-moisture.jpg" alt="" loading="lazy" decoding="async"></picture>
      <picture class="reveal"><source media="(max-width: 767px)" srcset="./images/mobile/07-point3-color-cheek.jpg"><img class="lp-full img-ratio-point3-color-cheek" src="./images/07-point3-color-cheek.jpg" alt="" loading="lazy" decoding="async"></picture>
      <picture class="reveal"><source media="(max-width: 767px)" srcset="./images/mobile/08-campaign.jpg"><img class="lp-full img-ratio-campaign" src="./images/08-campaign.jpg" alt="" loading="lazy" decoding="async"></picture>
      <picture class="reveal"><source media="(max-width: 767px)" srcset="./images/mobile/09-color-variation.jpg"><img class="lp-full img-ratio-color-variation" src="./images/09-color-variation.jpg" alt="" loading="lazy" decoding="async"></picture>
      <picture class="reveal"><source media="(max-width: 767px)" srcset="./images/mobile/10-purchase.jpg"><img class="lp-full img-ratio-purchase" src="./images/10-purchase.jpg" alt="" loading="lazy" decoding="async"></picture>
      <picture class="reveal"><source media="(max-width: 767px)" srcset="./images/mobile/11-policy-footer.jpg"><img class="lp-full img-ratio-policy-footer" src="./images/11-policy-footer.jpg" alt="" loading="lazy" decoding="async"></picture>
    </main>
    <button type="button" class="back-to-top" aria-label="トップへ戻る">↑</button>
    <script src="./script.js"></script>
  </body>
</html>
