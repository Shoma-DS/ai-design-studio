<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>STELLANT 占いコンテンツレンタルサービスLP</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="lp-shell" aria-label="STELLANT 占いコンテンツレンタルサービスLP">
      <picture class="lp-section lp-section-hero">
        <source media="(max-width: 767px)" srcset="./images/mobile/01-hero.png">
        <img class="lp-section-img img-ratio-hero" src="./images/01-hero.png" alt="STELLANT 占いコンテンツレンタルサービスLP" decoding="async" fetchpriority="high">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/02-about.png">
        <img class="lp-section-img img-ratio-about" src="./images/02-about.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/03-problem.png">
        <img class="lp-section-img img-ratio-problem" src="./images/03-problem.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/04-merit1.png">
        <img class="lp-section-img img-ratio-merit1" src="./images/04-merit1.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/05-merit2-3-industries.png">
        <img class="lp-section-img img-ratio-merit2-3-industries" src="./images/05-merit2-3-industries.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/06-service-content.png">
        <img class="lp-section-img img-ratio-service-content" src="./images/06-service-content.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/07-pricing.png">
        <img class="lp-section-img img-ratio-pricing" src="./images/07-pricing.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/08-agency-plan.png">
        <img class="lp-section-img img-ratio-agency-plan" src="./images/08-agency-plan.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/09-flow.png">
        <img class="lp-section-img img-ratio-flow" src="./images/09-flow.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/10-faq-contact.png">
        <img class="lp-section-img img-ratio-faq-contact" src="./images/10-faq-contact.png" alt="" loading="lazy">
      </picture>
    </main>
    <button type="button" class="back-to-top" aria-label="トップへ戻る">↑</button>
    <script src="./script.js"></script>
  </body>
</html>
