<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ホイールベース公式アプリ紹介LP</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="lp-shell" aria-label="ホイールベース公式アプリ紹介LP">
      <picture class="lp-section lp-section-hero">
        <source media="(max-width: 767px)" srcset="./images/mobile/01-header-hero.png">
        <img class="lp-section-img img-ratio-header-hero" src="./images/01-header-hero.png" alt="ホイールベース公式アプリ紹介LP" decoding="async" fetchpriority="high">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/02-member-features.png">
        <img class="lp-section-img img-ratio-member-features" src="./images/02-member-features.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/03-anyone-features.png">
        <img class="lp-section-img img-ratio-anyone-features" src="./images/03-anyone-features.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/04-extra-features.png">
        <img class="lp-section-img img-ratio-extra-features" src="./images/04-extra-features.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/05-card-steps-1-2.png">
        <img class="lp-section-img img-ratio-card-steps-1-2" src="./images/05-card-steps-1-2.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/06-card-steps-3-4.png">
        <img class="lp-section-img img-ratio-card-steps-3-4" src="./images/06-card-steps-3-4.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/07-app-operation-guide.png">
        <img class="lp-section-img img-ratio-app-operation-guide" src="./images/07-app-operation-guide.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/08-faq-cta.png">
        <img class="lp-section-img img-ratio-faq-cta" src="./images/08-faq-cta.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/09-footer.png">
        <img class="lp-section-img img-ratio-footer" src="./images/09-footer.png" alt="" loading="lazy">
      </picture>
    </main>
    <button type="button" class="back-to-top" aria-label="トップへ戻る">↑</button>
    <script src="./script.js"></script>
  </body>
</html>
