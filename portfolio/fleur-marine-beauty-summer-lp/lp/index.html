<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BEAUTE Fleur Marine 2026 Summer Campaign LP</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="lp-shell" aria-label="BEAUTE Fleur Marine 2026 Summer Campaign LP">
      <picture class="lp-section lp-section-hero">
        <source media="(max-width: 767px)" srcset="./images/mobile/01-hero.png">
        <img class="lp-section-img img-ratio-hero" src="./images/01-hero.png" alt="BEAUTE Fleur Marine 2026 Summer Campaign LP" decoding="async" fetchpriority="high">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/02-welcome-coupon.png">
        <img class="lp-section-img img-ratio-welcome-coupon" src="./images/02-welcome-coupon.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/03-corugi-intro.png">
        <img class="lp-section-img img-ratio-corugi-intro" src="./images/03-corugi-intro.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/04-corugi-what-is.png">
        <img class="lp-section-img img-ratio-corugi-what-is" src="./images/04-corugi-what-is.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/05-recommend-effect.png">
        <img class="lp-section-img img-ratio-recommend-effect" src="./images/05-recommend-effect.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/06-cta-reserve.png">
        <img class="lp-section-img img-ratio-cta-reserve" src="./images/06-cta-reserve.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/07-campaign-badge.png">
        <img class="lp-section-img img-ratio-campaign-badge" src="./images/07-campaign-badge.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/08-price-detail.png">
        <img class="lp-section-img img-ratio-price-detail" src="./images/08-price-detail.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/09-merit-icons.png">
        <img class="lp-section-img img-ratio-merit-icons" src="./images/09-merit-icons.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/10-coupon-cta.png">

      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/11-skincare-intro.png">
        <img class="lp-section-img img-ratio-skincare-intro" src="./images/11-skincare-intro.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/12-skincare-steps.png">
        <img class="lp-section-img img-ratio-skincare-steps" src="./images/12-skincare-steps.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">

      </picture>

      </picture>
      <picture class="lp-section reveal">

        <img class="lp-section-img img-ratio-product-sunscreen" src="./images/15-product-sunscreen.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/16-product-mask.png">
        <img class="lp-section-img img-ratio-product-mask" src="./images/16-product-mask.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">

      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/19-final-cta-footer.png">
        <img class="lp-section-img img-ratio-final-cta-footer" src="./images/19-final-cta-footer.png" alt="" loading="lazy">
      </picture>
    </main>
    <button type="button" class="back-to-top" aria-label="トップへ戻る">↑</button>
    <script src="./script.js"></script>
  </body>
</html>
