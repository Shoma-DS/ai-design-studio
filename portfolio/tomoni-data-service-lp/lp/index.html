<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>株式会社トモニデータサービス コーポレートLP</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="lp-shell" aria-label="株式会社トモニデータサービス コーポレートLP">
      <picture class="lp-section lp-section-hero">
        <source media="(max-width: 767px)" srcset="./images/mobile/01-header-hero.png">
        <img class="lp-section-img img-ratio-header-hero" src="./images/01-header-hero.png" alt="株式会社トモニデータサービス コーポレートLP" decoding="async" fetchpriority="high">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/02-business-cards.png">
        <img class="lp-section-img img-ratio-business-cards" src="./images/02-business-cards.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/03-pickup.png">
        <img class="lp-section-img img-ratio-pickup" src="./images/03-pickup.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/04-info-circles.png">
        <img class="lp-section-img img-ratio-info-circles" src="./images/04-info-circles.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/05-news.png">
        <img class="lp-section-img img-ratio-news" src="./images/05-news.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/06-badges.png">
        <img class="lp-section-img img-ratio-badges" src="./images/06-badges.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/07-footer.png">
        <img class="lp-section-img img-ratio-footer" src="./images/07-footer.png" alt="" loading="lazy">
      </picture>
    </main>
    <button type="button" class="back-to-top" aria-label="トップへ戻る">↑</button>
    <script src="./script.js"></script>
  </body>
</html>
