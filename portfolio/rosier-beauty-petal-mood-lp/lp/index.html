<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ROSIER BEAUTY PETAL mood コスメキャンペーンLP</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="lp-shell" aria-label="ROSIER BEAUTY PETAL mood コスメキャンペーンLP">
      <picture class="lp-section lp-section-hero">
        <source media="(max-width: 767px)" srcset="./images/mobile/01-hero.png">
        <img class="lp-section-img img-ratio-hero" src="./images/01-hero.png" alt="ROSIER BEAUTY PETAL mood コスメキャンペーンLP" decoding="async" fetchpriority="high">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/02-drop1-mood.png">
        <img class="lp-section-img img-ratio-drop1-mood" src="./images/02-drop1-mood.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/03-drop1-products.png">
        <img class="lp-section-img img-ratio-drop1-products" src="./images/03-drop1-products.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/04-drop2-mood.png">
        <img class="lp-section-img img-ratio-drop2-mood" src="./images/04-drop2-mood.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/05-drop2-products.png">
        <img class="lp-section-img img-ratio-drop2-products" src="./images/05-drop2-products.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/06-drop2-closing.png">
        <img class="lp-section-img img-ratio-drop2-closing" src="./images/06-drop2-closing.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/07-drop3-mood.png">
        <img class="lp-section-img img-ratio-drop3-mood" src="./images/07-drop3-mood.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/08-drop3-products.png">
        <img class="lp-section-img img-ratio-drop3-products" src="./images/08-drop3-products.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/09-footer.png">
        <img class="lp-section-img img-ratio-footer" src="./images/09-footer.png" alt="" loading="lazy">
      </picture>
    </main>
    <button type="button" class="back-to-top" aria-label="トップへ戻る">↑</button>
    <script src="./script.js"></script>
  </body>
</html>
