<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>キャリアブリッジ（CAREER BRIDGE）転職支援サービスLP</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="lp-shell" aria-label="キャリアブリッジ（CAREER BRIDGE）転職支援サービスLP">
      <picture class="lp-section lp-section-hero">
        <source media="(max-width: 767px)" srcset="./images/mobile/01-hero-header.png">
        <img class="lp-section-img img-ratio-hero-header" src="./images/01-hero-header.png" alt="キャリアブリッジ（CAREER BRIDGE）転職支援サービスLP" decoding="async" fetchpriority="high">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/02-pain-points-3steps.png">
        <img class="lp-section-img img-ratio-pain-points-3steps" src="./images/02-pain-points-3steps.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/03-cta-subheading.png">
        <img class="lp-section-img img-ratio-cta-subheading" src="./images/03-cta-subheading.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/04-consultation-support.png">
        <img class="lp-section-img img-ratio-consultation-support" src="./images/04-consultation-support.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/05-case-study-1.png">
        <img class="lp-section-img img-ratio-case-study-1" src="./images/05-case-study-1.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/06-case-study-2.png">
        <img class="lp-section-img img-ratio-case-study-2" src="./images/06-case-study-2.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/07-quality-companies.png">
        <img class="lp-section-img img-ratio-quality-companies" src="./images/07-quality-companies.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/08-value-props.png">
        <img class="lp-section-img img-ratio-value-props" src="./images/08-value-props.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/09-flow-step1.png">
        <img class="lp-section-img img-ratio-flow-step1" src="./images/09-flow-step1.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/10-flow-step2-3.png">
        <img class="lp-section-img img-ratio-flow-step2-3" src="./images/10-flow-step2-3.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/11-flow-step4-5-closing.png">
        <img class="lp-section-img img-ratio-flow-step4-5-closing" src="./images/11-flow-step4-5-closing.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/12-footer.png">
        <img class="lp-section-img img-ratio-footer" src="./images/12-footer.png" alt="" loading="lazy">
      </picture>
    </main>
    <button type="button" class="back-to-top" aria-label="トップへ戻る">↑</button>
    <script src="./script.js"></script>
  </body>
</html>
