<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>サンシャインベリー UVケアインナーサプリメント LP</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="lp-shell" aria-label="サンシャインベリー UVケアインナーサプリメント LP">
      <picture class="lp-section lp-section-hero">
        <source media="(max-width: 767px)" srcset="./images/mobile/01-hero.png">
        <img class="lp-section-img img-ratio-hero" src="./images/01-hero.png" alt="サンシャインベリー UVケアインナーサプリメント LP" decoding="async" fetchpriority="high">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/02-product-info.png">
        <img class="lp-section-img img-ratio-product-info" src="./images/02-product-info.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/03-ribbon.png">
        <img class="lp-section-img img-ratio-ribbon" src="./images/03-ribbon.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/04-pain-points.png">
        <img class="lp-section-img img-ratio-pain-points" src="./images/04-pain-points.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/05-grape.png">
        <img class="lp-section-img img-ratio-grape" src="./images/05-grape.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/06-phytochemical.png">
        <img class="lp-section-img img-ratio-phytochemical" src="./images/06-phytochemical.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/07-comparison.png">
        <img class="lp-section-img img-ratio-comparison" src="./images/07-comparison.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/08-goldenberry.png">
        <img class="lp-section-img img-ratio-goldenberry" src="./images/08-goldenberry.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/09-benefit.png">
        <img class="lp-section-img img-ratio-benefit" src="./images/09-benefit.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/10-lifestyle.png">
        <img class="lp-section-img img-ratio-lifestyle" src="./images/10-lifestyle.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/11-quality.png">
        <img class="lp-section-img img-ratio-quality" src="./images/11-quality.png" alt="" loading="lazy">
      </picture>
    </main>
    <button type="button" class="back-to-top" aria-label="トップへ戻る">↑</button>
    <script src="./script.js"></script>
  </body>
</html>
