<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ASTELLA MOTORS「V-XR」コンパクトSUV LP</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="lp-shell" aria-label="ASTELLA MOTORS「V-XR」コンパクトSUV LP">
      <picture class="lp-section lp-section-hero">
        <source media="(max-width: 767px)" srcset="./images/mobile/01-hero.png">
        <img class="lp-section-img img-ratio-hero" src="./images/01-hero.png" alt="ASTELLA MOTORS「V-XR」コンパクトSUV LP" decoding="async" fetchpriority="high">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/02-brand-statement.png">
        <img class="lp-section-img img-ratio-brand-statement" src="./images/02-brand-statement.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/03-styling.png">
        <img class="lp-section-img img-ratio-styling" src="./images/03-styling.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/04-interior.png">
        <img class="lp-section-img img-ratio-interior" src="./images/04-interior.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/05-driving.png">
        <img class="lp-section-img img-ratio-driving" src="./images/05-driving.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/06-safety.png">
        <img class="lp-section-img img-ratio-safety" src="./images/06-safety.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/07-about-price.png">
        <img class="lp-section-img img-ratio-about-price" src="./images/07-about-price.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/08-performance-bodycolor.png">
        <img class="lp-section-img img-ratio-performance-bodycolor" src="./images/08-performance-bodycolor.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/09-seat-aeroparts.png">
        <img class="lp-section-img img-ratio-seat-aeroparts" src="./images/09-seat-aeroparts.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/10-plan-intro.png">
        <img class="lp-section-img img-ratio-plan-intro" src="./images/10-plan-intro.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/11-plan-examples.png">
        <img class="lp-section-img img-ratio-plan-examples" src="./images/11-plan-examples.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/12-shop-info.png">
        <img class="lp-section-img img-ratio-shop-info" src="./images/12-shop-info.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/13-footer.png">
        <img class="lp-section-img img-ratio-footer" src="./images/13-footer.png" alt="" loading="lazy">
      </picture>
    </main>
    <button type="button" class="back-to-top" aria-label="トップへ戻る">↑</button>
    <script src="./script.js"></script>
  </body>
</html>
