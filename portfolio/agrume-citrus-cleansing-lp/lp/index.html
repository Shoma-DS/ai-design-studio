<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AGRUME Citrus Cleansing LP Portfolio</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="lp-shell" aria-label="AGRUME Citrus Cleansing LP Portfolio">
      <picture class="lp-section lp-section-hero">
        <source media="(max-width: 767px)" srcset="./images/mobile/01-hero.png">
        <img class="lp-section-img img-ratio-hero" src="./images/01-hero.png" alt="AGRUME Citrus Cleansing LP Portfolio" decoding="async" fetchpriority="high">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/02-arrival-band.png">
        <img class="lp-section-img img-ratio-arrival-band" src="./images/02-arrival-band.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/03-foam-feature.png">
        <img class="lp-section-img img-ratio-foam-feature" src="./images/03-foam-feature.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/04-ingredient-trust.png">
        <img class="lp-section-img img-ratio-ingredient-trust" src="./images/04-ingredient-trust.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/05-type-a-jelly.png">
        <img class="lp-section-img img-ratio-type-a-jelly" src="./images/05-type-a-jelly.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/06-type-b-milk.png">
        <img class="lp-section-img img-ratio-type-b-milk" src="./images/06-type-b-milk.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/07-type-c-lotion.png">
        <img class="lp-section-img img-ratio-type-c-lotion" src="./images/07-type-c-lotion.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/08-campaign.png">
        <img class="lp-section-img img-ratio-campaign" src="./images/08-campaign.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/09-origin-story.png">
        <img class="lp-section-img img-ratio-origin-story" src="./images/09-origin-story.png" alt="" loading="lazy">
      </picture>
      <picture class="lp-section reveal">
        <source media="(max-width: 767px)" srcset="./images/mobile/10-final-footer.png">
        <img class="lp-section-img img-ratio-final-footer" src="./images/10-final-footer.png" alt="" loading="lazy">
      </picture>
    </main>
    <button type="button" class="back-to-top" aria-label="トップへ戻る">↑</button>
    <script src="./script.js"></script>
  </body>
</html>
